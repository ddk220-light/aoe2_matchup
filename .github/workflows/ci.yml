name: CI

on:
  push:
    branches: [staging, main]
  pull_request:
    branches: [staging, main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: webapp/requirements.txt

      # The suite runs entirely from committed artifacts (DBs/JSON in webapp/).
      # mgz (replay parsing) is intentionally NOT installed: the app degrades
      # gracefully without it and no test requires it — keeps CI fast and
      # avoids depending on the fork tarball being reachable.
      - name: Install Python deps
        run: |
          pip install flask numpy requests Pillow pytest

      - name: pytest
        run: pytest -q

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Frontend parity tests (Node)
        run: |
          node tests/test_frontend_projectile_miss.js
          node tests/test_sim_params.js
