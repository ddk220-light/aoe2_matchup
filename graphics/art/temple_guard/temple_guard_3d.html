<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Elite Temple Guard — 3D SVG model</title>
<style>
  :root { color-scheme: dark; }
  html,body{height:100%;margin:0}
  body{
    background:radial-gradient(120% 90% at 50% 30%, #2b2018 0%, #150e09 55%, #070504 100%);
    display:grid; place-items:center; overflow:hidden; font-family:Georgia,serif;
  }
  .label{position:fixed;top:22px;left:0;right:0;text-align:center;color:#e8c98a;
    letter-spacing:.32em;font-size:13px;text-transform:uppercase;opacity:.85}
  .hint{position:fixed;bottom:18px;left:0;right:0;text-align:center;
    color:#8a6f4e;font-size:11px;letter-spacing:.15em}
  .booth{perspective:1500px;perspective-origin:50% 42%}
  .turntable{
    transform-style:preserve-3d;
    animation:spin 11s cubic-bezier(.45,0,.55,1) infinite;
    will-change:transform;
  }
  .turntable img{
    display:block;width:430px;
    filter:drop-shadow(0 26px 26px rgba(0,0,0,.55));
  }
  /* gentle bounded turntable (never edge-on, so the flat art reads as a turning statue) */
  @keyframes spin{
    0%   {transform:rotateY(-30deg)}
    50%  {transform:rotateY( 30deg)}
    100% {transform:rotateY(-30deg)}
  }
  /* moving floor disc + glow react to give a staged, dimensional feel */
  .disc{position:fixed;bottom:14%;left:50%;width:300px;height:60px;margin-left:-150px;
    background:radial-gradient(50% 50% at 50% 50%, rgba(232,201,138,.18), transparent 70%);
    border-radius:50%}
  @media (prefers-reduced-motion: reduce){ .turntable{animation:none;transform:rotateY(-12deg)} }
</style>
</head>
<body>
  <div class="label">Elite Temple Guard</div>
  <div class="disc"></div>
  <div class="booth">
    <div class="turntable"><img src="temple_guard_3d.svg" alt="Temple Guard 3D model"></div>
  </div>
  <div class="hint">pure SVG model · turntable + idle animation</div>
</body>
</html>
