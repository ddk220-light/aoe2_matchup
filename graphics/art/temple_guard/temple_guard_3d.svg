<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 700" width="440" height="700" font-family="serif">
<defs>
  <!-- ===== lighting model: key light top-left ===== -->
  <radialGradient id="skin" cx="42%" cy="30%" r="80%">
    <stop offset="0%" stop-color="#d59a64"/><stop offset="55%" stop-color="#a96b3d"/>
    <stop offset="100%" stop-color="#6c3f22"/>
  </radialGradient>
  <radialGradient id="skinArm" cx="40%" cy="25%" r="90%">
    <stop offset="0%" stop-color="#c98c58"/><stop offset="100%" stop-color="#5e3620"/>
  </radialGradient>
  <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#fff3c4"/><stop offset="35%" stop-color="#f4c84e"/>
    <stop offset="70%" stop-color="#cf9326"/><stop offset="100%" stop-color="#7d5212"/>
  </linearGradient>
  <linearGradient id="goldDark" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#d6a63a"/><stop offset="100%" stop-color="#5e3d0e"/>
  </linearGradient>
  <linearGradient id="green" x1="0" y1="0" x2="0.4" y2="1">
    <stop offset="0%" stop-color="#3f8a52"/><stop offset="55%" stop-color="#266b3c"/>
    <stop offset="100%" stop-color="#103a21"/>
  </linearGradient>
  <linearGradient id="feather" x1="0" y1="1" x2="0" y2="0">
    <stop offset="0%" stop-color="#7c1c16"/><stop offset="35%" stop-color="#c4321d"/>
    <stop offset="72%" stop-color="#ef8a2c"/><stop offset="100%" stop-color="#ffd954"/>
  </linearGradient>
  <linearGradient id="featherDk" x1="0" y1="1" x2="0" y2="0">
    <stop offset="0%" stop-color="#5e140f"/><stop offset="50%" stop-color="#9c2516"/>
    <stop offset="100%" stop-color="#d6702a"/>
  </linearGradient>
  <radialGradient id="jade" cx="38%" cy="30%" r="80%">
    <stop offset="0%" stop-color="#8ff0b6"/><stop offset="100%" stop-color="#176b44"/>
  </radialGradient>
  <linearGradient id="wood" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#8a5a2e"/><stop offset="50%" stop-color="#5c3617"/>
    <stop offset="100%" stop-color="#34200f"/>
  </linearGradient>
  <radialGradient id="bg" cx="50%" cy="38%" r="75%">
    <stop offset="0%" stop-color="#4a3526"/><stop offset="55%" stop-color="#241a12"/>
    <stop offset="100%" stop-color="#0c0805"/>
  </radialGradient>
  <linearGradient id="cloth2" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#b6402b"/><stop offset="100%" stop-color="#5e160d"/>
  </linearGradient>
  <filter id="ds" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="3" dy="6" stdDeviation="5" flood-color="#000" flood-opacity="0.45"/>
  </filter>
  <filter id="soft"><feGaussianBlur stdDeviation="1.1"/></filter>
  <style>
    #scene{transform-box:fill-box;transform-origin:50% 60%}
    @keyframes sway{0%,100%{transform:rotate(-1.3deg)}50%{transform:rotate(1.3deg)}}
    @keyframes breathe{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
    #plumes{transform-box:fill-box;transform-origin:50% 95%;animation:sway 5.5s ease-in-out infinite}
    #upper{animation:breathe 5s ease-in-out infinite}
  </style>
</defs>

<rect width="440" height="700" fill="url(#bg)"/>
<ellipse cx="220" cy="648" rx="120" ry="26" fill="#000" opacity="0.5" filter="url(#soft)"/>

<g id="scene">

  <!-- ============ BANNER / STANDARD (behind) ============ -->
  <g filter="url(#ds)">
    <rect x="300" y="120" width="9" height="430" rx="3" fill="url(#wood)"/>
    <!-- standard plaque -->
    <path d="M276 150 q44 -34 88 0 q-10 50 -44 70 q-34 -20 -44 -70 z" fill="url(#goldDark)" stroke="#3a2607" stroke-width="2"/>
    <path d="M289 156 q31 -22 62 0 q-7 36 -31 50 q-24 -14 -31 -50 z" fill="url(#jade)" opacity="0.9"/>
    <circle cx="320" cy="178" r="11" fill="url(#gold)" stroke="#6b4710" stroke-width="1.5"/>
    <!-- hanging feather tassels -->
    <path d="M300 196 q-6 40 -2 78" stroke="#9c2516" stroke-width="4" fill="none"/>
    <path d="M340 196 q7 40 2 80" stroke="#c4321d" stroke-width="4" fill="none"/>
    <circle cx="297" cy="276" r="6" fill="#e8c24a"/><circle cx="343" cy="278" r="6" fill="#e8c24a"/>
  </g>

  <!-- ============ FAR ARM + STAFF (figure's left / viewer right) ============ -->
  <g filter="url(#ds)">
    <!-- staff -->
    <rect x="258" y="96" width="8" height="470" rx="4" fill="url(#wood)"/>
    <!-- gold blade head -->
    <path d="M262 96 l-22 16 q22 -52 22 -70 q0 18 22 70 z" fill="url(#gold)" stroke="#6b4710" stroke-width="1.5"/>
    <path d="M262 40 l0 56" stroke="#fff7d8" stroke-width="1.4" opacity="0.7"/>
    <!-- binding -->
    <rect x="254" y="150" width="16" height="10" rx="3" fill="url(#goldDark)"/>
  </g>

  <g id="upper">
  <!-- ============ FAR LEG ============ -->
  <path d="M232 432 q26 6 30 60 q4 60 -4 110 l-22 2 q-6 -86 -14 -120 q-6 -34 10 -52 z" fill="url(#skin)" filter="url(#ds)"/>
  <path d="M236 560 q14 -2 24 2 l2 36 q-18 8 -32 0 q2 -22 6 -38z" fill="url(#goldDark)" stroke="#3a2607" stroke-width="1.5"/>

  <!-- ============ NEAR LEG ============ -->
  <path d="M204 430 q-30 8 -34 64 q-4 64 6 116 l24 1 q6 -90 14 -126 q6 -36 -10 -55 z" fill="url(#skin)" filter="url(#ds)"/>
  <path d="M180 506 q10 24 0 60" stroke="#5e3620" stroke-width="3" fill="none" opacity="0.5"/>
  <!-- shin greave -->
  <path d="M176 560 q16 -3 30 1 l3 38 q-22 9 -38 0 q1 -24 5 -39z" fill="url(#gold)" stroke="#6b4710" stroke-width="1.5"/>
  <path d="M180 566 l24 0" stroke="#fff7d8" stroke-width="1.2" opacity="0.6"/>

  <!-- ============ KILT / LOINCLOTH ============ -->
  <path d="M168 352 q52 -20 104 0 q10 56 2 96 q-54 22 -108 0 q-8 -44 2 -96 z" fill="url(#green)" filter="url(#ds)"/>
  <!-- kilt panels -->
  <g stroke="#0c2a16" stroke-width="1.4" opacity="0.8">
    <path d="M192 360 l-4 86" fill="none"/><path d="M220 356 l0 92" fill="none"/><path d="M248 360 l4 86" fill="none"/>
  </g>
  <!-- center hanging cloth (red) -->
  <path d="M206 360 q14 -6 28 0 q4 70 -2 118 q-12 6 -24 0 q-6 -50 -2 -118z" fill="url(#cloth2)" filter="url(#ds)"/>
  <path d="M210 470 l20 0 -10 16 z" fill="#7d2c18"/>
  <!-- gold belt + lamellar -->
  <path d="M164 346 q56 -16 112 0 l0 20 q-56 16 -112 0 z" fill="url(#gold)" stroke="#6b4710" stroke-width="1.6"/>
  <g fill="url(#goldDark)" stroke="#5e3d0e" stroke-width="0.8">
    <rect x="176" y="366" width="16" height="22" rx="3"/><rect x="196" y="368" width="16" height="24" rx="3"/>
    <rect x="216" y="369" width="16" height="24" rx="3"/><rect x="236" y="368" width="16" height="24" rx="3"/>
    <rect x="256" y="366" width="14" height="22" rx="3"/>
  </g>
  <circle cx="220" cy="356" r="9" fill="url(#jade)" stroke="#6b4710" stroke-width="2"/>

  <!-- ============ TORSO ============ -->
  <path d="M176 236 q44 -22 90 0 q14 60 6 118 q-50 20 -102 0 q-8 -58 6 -118 z" fill="url(#skin)" filter="url(#ds)"/>
  <!-- abs / chest shading -->
  <g fill="#5e3620" opacity="0.35">
    <path d="M220 250 q-2 50 0 96" stroke="#5e3620" stroke-width="2.5" fill="none"/>
    <ellipse cx="198" cy="268" rx="16" ry="11"/><ellipse cx="242" cy="268" rx="16" ry="11"/>
  </g>
  <g fill="#e6b487" opacity="0.4"><ellipse cx="196" cy="262" rx="9" ry="6"/><ellipse cx="240" cy="262" rx="9" ry="6"/></g>
  <!-- shoulder armor (pauldrons) -->
  <path d="M168 238 q-18 4 -22 30 q24 12 44 4 q2 -24 -22 -34 z" fill="url(#gold)" stroke="#6b4710" stroke-width="1.6" filter="url(#ds)"/>
  <path d="M272 238 q18 4 22 30 q-24 12 -44 4 q-2 -24 22 -34 z" fill="url(#gold)" stroke="#6b4710" stroke-width="1.6" filter="url(#ds)"/>
  <path d="M150 256 q18 8 38 4" stroke="#fff7d8" stroke-width="1.3" fill="none" opacity="0.6"/>

  <!-- ============ NEAR ARM (viewer left) holding club ============ -->
  <g filter="url(#ds)">
    <path d="M172 252 q-30 16 -36 64 q-6 44 4 86 q16 6 26 -2 q-8 -42 -2 -78 q4 -34 26 -50 z" fill="url(#skinArm)"/>
    <!-- armband -->
    <rect x="138" y="306" width="30" height="14" rx="6" fill="url(#gold)" stroke="#6b4710" stroke-width="1.4"/>
    <!-- fist -->
    <ellipse cx="150" cy="404" rx="18" ry="15" fill="url(#skinArm)"/>
    <!-- club / macuahuitl -->
    <path d="M140 410 q12 -6 22 0 q4 -70 -2 -150 q-9 -5 -18 0 q-6 80 -2 150 z" fill="url(#wood)" stroke="#2a1809" stroke-width="1.5"/>
    <g fill="#2c2c30" stroke="#0c0c10" stroke-width="0.6">
      <path d="M138 300 l-8 -8 l8 -2 z"/><path d="M162 300 l8 -8 l-8 -2 z"/>
      <path d="M137 330 l-9 -7 l9 -2 z"/><path d="M163 330 l9 -7 l-9 -2 z"/>
      <path d="M138 360 l-8 -7 l8 -2 z"/><path d="M162 360 l8 -7 l-8 -2 z"/>
    </g>
  </g>

  <!-- ============ NECK + COLLAR ============ -->
  <path d="M204 214 q16 -6 32 0 l0 26 q-16 8 -32 0 z" fill="url(#skin)"/>
  <!-- jade + gold collar -->
  <path d="M186 236 q34 22 68 0 q-6 18 -34 22 q-28 -4 -34 -22 z" fill="url(#gold)" stroke="#6b4710" stroke-width="1.6" filter="url(#ds)"/>
  <g><circle cx="200" cy="244" r="5" fill="url(#jade)"/><circle cx="220" cy="250" r="6" fill="url(#jade)"/><circle cx="240" cy="244" r="5" fill="url(#jade)"/></g>

  <!-- ============ HEAD ============ -->
  <g filter="url(#ds)">
    <path d="M192 168 q28 -20 56 0 q8 24 0 44 q-12 18 -28 18 q-16 0 -28 -18 q-8 -20 0 -44 z" fill="url(#skin)"/>
    <!-- cheek shadow -->
    <path d="M196 196 q10 16 24 16 q14 0 24 -16 q-6 22 -24 24 q-18 -2 -24 -24z" fill="#5e3620" opacity="0.35"/>
    <!-- war paint -->
    <path d="M198 188 l44 0" stroke="#b6402b" stroke-width="4" opacity="0.85"/>
    <!-- brow + eyes (fierce) -->
    <path d="M200 180 q12 -6 20 0" stroke="#2a1607" stroke-width="3" fill="none"/>
    <path d="M220 180 q12 -6 20 0" stroke="#2a1607" stroke-width="3" fill="none"/>
    <ellipse cx="208" cy="187" rx="5" ry="3.4" fill="#1a0e05"/><ellipse cx="232" cy="187" rx="5" ry="3.4" fill="#1a0e05"/>
    <circle cx="209" cy="186" r="1.2" fill="#fff" opacity="0.8"/><circle cx="233" cy="186" r="1.2" fill="#fff" opacity="0.8"/>
    <!-- nose + mouth -->
    <path d="M220 190 l-3 14 q3 3 6 0 z" fill="#7a4a28"/>
    <path d="M210 210 q10 7 20 0" stroke="#3a1c0c" stroke-width="2.5" fill="none"/>
    <!-- gold nose/ear ornaments -->
    <circle cx="186" cy="196" r="6" fill="url(#gold)" stroke="#6b4710" stroke-width="1.2"/>
    <circle cx="254" cy="196" r="6" fill="url(#gold)" stroke="#6b4710" stroke-width="1.2"/>
  </g>

  <!-- ============ HEADDRESS PLUMES ============ -->
  <g id="plumes" filter="url(#ds)">
    <!-- back fan -->
    <g fill="url(#featherDk)" stroke="#4a120d" stroke-width="1">
      <path d="M220 168 q-78 -36 -96 -120 q34 30 96 60 z"/>
      <path d="M220 168 q78 -36 96 -120 q-34 30 -96 60 z"/>
      <path d="M220 166 q-52 -52 -50 -132 q26 44 50 96 z"/>
      <path d="M220 166 q52 -52 50 -132 q-26 44 -50 96 z"/>
    </g>
    <!-- front feathers -->
    <g fill="url(#feather)" stroke="#7c1c16" stroke-width="1">
      <path d="M220 162 q-44 -44 -42 -118 q22 40 42 86 z"/>
      <path d="M220 162 q44 -44 42 -118 q-22 40 -42 86 z"/>
      <path d="M220 160 q-24 -56 -16 -126 q14 50 16 100 z"/>
      <path d="M220 160 q24 -56 16 -126 q-14 50 -16 100 z"/>
      <path d="M220 160 q-2 -64 2 -132 q4 64 -2 132 z"/>
    </g>
    <!-- feather rachis highlights -->
    <g stroke="#ffe6a0" stroke-width="1" opacity="0.6" fill="none">
      <path d="M220 158 q-18 -44 -12 -110"/><path d="M220 158 q18 -44 12 -110"/><path d="M221 156 l0 -120"/>
    </g>
    <!-- gold headband -->
    <path d="M188 158 q32 -14 64 0 q-4 16 -32 18 q-28 -2 -32 -18 z" fill="url(#gold)" stroke="#6b4710" stroke-width="1.6"/>
    <circle cx="220" cy="160" r="8" fill="url(#jade)" stroke="#6b4710" stroke-width="2"/>
    <circle cx="200" cy="164" r="3.5" fill="#fff3c4"/><circle cx="240" cy="164" r="3.5" fill="#fff3c4"/>
  </g>
  </g><!-- /upper -->

  <!-- rim light -->
  <g opacity="0.5" stroke="#ffe9b0" stroke-width="1.4" fill="none" filter="url(#soft)">
    <path d="M180 240 q-12 56 0 110"/><path d="M150 260 q-22 60 -8 130"/>
  </g>
</g>
</svg>
