<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}AoE2 Unit Analyzer{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Source+Sans+3:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script>
        /* Apply saved theme before paint to prevent flash */
        (function() {
            var t = localStorage.getItem('aoe2-theme');
            if (t) document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}" />
    {% block page_css %}{% endblock %}
</head>
<body>
    <nav class="site-nav">
        <a href="/" class="nav-brand">
            <svg class="nav-brand-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
            </svg>
            AoE2 Analyzer
        </a>
        <div class="nav-links">
            <a href="/" class="nav-tab {% if active_nav == 'simulate' %}active{% endif %}">
                <span class="nav-tab-icon">&#9876;</span>
                <span class="nav-tab-label">Battle Sim</span>
                <span class="nav-tab-desc">Army combat simulator</span>
            </a>
            <a href="/matchup-advisor" class="nav-tab {% if active_nav == 'matchup' %}active{% endif %}">
                <span class="nav-tab-icon">&#9813;</span>
                <span class="nav-tab-label">Matchup Advisor</span>
                <span class="nav-tab-desc">Coming soon</span>
            </a>
            <a href="/team-analysis" class="nav-tab {% if active_nav == 'team_analysis' %}active{% endif %}">
                <span class="nav-tab-icon">&#9881;</span>
                <span class="nav-tab-label">Team Analysis</span>
                <span class="nav-tab-desc">4v4 team matchups</span>
            </a>
            <a href="/units" class="nav-tab {% if active_nav == 'rankings' %}active{% endif %}">
                <span class="nav-tab-icon">&#9734;</span>
                <span class="nav-tab-label">Rankings</span>
                <span class="nav-tab-desc">Unit stat comparisons</span>
            </a>
            <a href="/civilizations" class="nav-tab {% if active_nav in ['civ_select', 'civ_detail'] %}active{% endif %}">
                <span class="nav-tab-icon">&#127984;</span>
                <span class="nav-tab-label">Civilizations</span>
                <span class="nav-tab-desc">Strengths &amp; strategy</span>
            </a>
        </div>
        <div class="theme-toggle">
            <button class="theme-toggle-btn" id="themeToggle" title="Toggle light/dark mode">
                <span class="toggle-icon" id="themeIcon">&#9790;</span>
                <span class="theme-toggle-label" id="themeLabel">Light</span>
            </button>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <script src="{{ url_for('static', filename='js/constants.js') }}"></script>
    <script src="{{ url_for('static', filename='js/api_client.js') }}"></script>
    <script>
        (function() {
            var btn   = document.getElementById('themeToggle');
            var icon  = document.getElementById('themeIcon');
            var label = document.getElementById('themeLabel');

            function applyTheme(theme) {
                if (theme === 'light') {
                    document.documentElement.setAttribute('data-theme', 'light');
                    icon.innerHTML  = '&#9728;';
                    label.textContent = 'Dark';
                } else {
                    document.documentElement.removeAttribute('data-theme');
                    icon.innerHTML  = '&#9790;';
                    label.textContent = 'Light';
                }
            }

            /* Set correct icon on load */
            applyTheme(localStorage.getItem('aoe2-theme') || 'dark');

            btn.addEventListener('click', function() {
                var current = document.documentElement.getAttribute('data-theme');
                var next    = current === 'light' ? 'dark' : 'light';
                localStorage.setItem('aoe2-theme', next);
                applyTheme(next);
            });
        })();
    </script>
    {% block page_js %}{% endblock %}
</body>
</html>
