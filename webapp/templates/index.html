<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AoE2 Unit Analyzer</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --primary-color: #8b4513;
                --secondary-color: #daa520;
                --bg-color: #1a1a2e;
                --card-bg: #16213e;
                --text-color: #e8e8e8;
                --highlight-better: #2ecc71;
                --highlight-worse: #e74c3c;
                --highlight-unique: #f39c12;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: "Open Sans", sans-serif;
                background: linear-gradient(
                    135deg,
                    var(--bg-color) 0%,
                    #0f0f23 100%
                );
                color: var(--text-color);
                min-height: 100vh;
                padding: 20px;
            }

            .container {
                max-width: 1600px;
                margin: 0 auto;
            }

            header {
                text-align: center;
                padding: 30px 0;
                margin-bottom: 30px;
            }

            h1 {
                font-family: "Cinzel", serif;
                font-size: 3rem;
                color: var(--secondary-color);
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
                margin-bottom: 10px;
            }

            .subtitle {
                font-size: 1.1rem;
                color: #888;
            }

            .unit-selector {
                display: flex;
                flex-wrap: wrap;
                gap: 12px;
                justify-content: center;
                margin-bottom: 40px;
                padding: 20px;
                background: var(--card-bg);
                border-radius: 15px;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            }

            .unit-btn {
                padding: 12px 24px;
                font-size: 1rem;
                font-family: "Cinzel", serif;
                background: linear-gradient(145deg, #2d2d5a, #1a1a3e);
                color: var(--text-color);
                border: 2px solid transparent;
                border-radius: 8px;
                cursor: pointer;
                transition: all 0.3s ease;
                position: relative;
                overflow: hidden;
            }

            .unit-btn:hover {
                transform: translateY(-2px);
                border-color: var(--secondary-color);
                box-shadow: 0 5px 15px rgba(218, 165, 32, 0.3);
            }

            .unit-btn.active {
                background: linear-gradient(
                    145deg,
                    var(--secondary-color),
                    #b8860b
                );
                color: #1a1a2e;
                font-weight: 600;
                border-color: var(--secondary-color);
            }

            .unit-btn::before {
                content: "";
                position: absolute;
                top: 0;
                left: -100%;
                width: 100%;
                height: 100%;
                background: linear-gradient(
                    90deg,
                    transparent,
                    rgba(255, 255, 255, 0.1),
                    transparent
                );
                transition: left 0.5s;
            }

            .unit-btn:hover::before {
                left: 100%;
            }

            .table-container {
                background: var(--card-bg);
                border-radius: 15px;
                padding: 25px;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
                overflow-x: auto;
                animation: fadeIn 0.5s ease;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .table-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 20px;
            }

            .table-title {
                font-family: "Cinzel", serif;
                font-size: 1.8rem;
                color: var(--secondary-color);
            }

            .civ-count {
                background: rgba(218, 165, 32, 0.2);
                padding: 8px 16px;
                border-radius: 20px;
                font-size: 0.9rem;
            }

            table {
                width: 100%;
                border-collapse: separate;
                border-spacing: 0;
                font-size: 0.9rem;
            }

            thead th {
                background: linear-gradient(145deg, #3d3d7a, #2a2a5e);
                padding: 15px 12px;
                text-align: left;
                font-weight: 600;
                color: var(--secondary-color);
                cursor: pointer;
                user-select: none;
                white-space: nowrap;
                position: sticky;
                top: 0;
                transition: background 0.2s;
            }

            thead th:hover {
                background: linear-gradient(145deg, #4d4d8a, #3a3a6e);
            }

            thead th::after {
                content: "";
                margin-left: 8px;
                opacity: 0.5;
            }

            thead th.sort-asc::after {
                content: "▲";
                opacity: 1;
            }

            thead th.sort-desc::after {
                content: "▼";
                opacity: 1;
            }

            thead th:first-child {
                border-top-left-radius: 10px;
            }

            thead th:last-child {
                border-top-right-radius: 10px;
            }

            tbody tr {
                transition: background 0.2s;
            }

            tbody tr:nth-child(even) {
                background: rgba(255, 255, 255, 0.03);
            }

            tbody tr:hover {
                background: rgba(218, 165, 32, 0.1);
            }

            td {
                padding: 12px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
                position: relative;
            }

            td.civ-name {
                font-weight: 600;
                color: var(--secondary-color);
                cursor: help;
            }

            td.civ-name.has-bonus {
                text-decoration: underline dotted;
                text-underline-offset: 3px;
            }

            td.unique-better {
                background: rgba(46, 204, 113, 0.2);
                color: var(--highlight-better);
                font-weight: 600;
                cursor: help;
            }

            td.unique-worse {
                background: rgba(231, 76, 60, 0.2);
                color: var(--highlight-worse);
                font-weight: 600;
                cursor: help;
            }

            td.unique-different {
                background: rgba(243, 156, 18, 0.2);
                color: var(--highlight-unique);
                font-weight: 600;
            }

            /* Generic/grouped row styles */
            tr.generic-row {
                background: rgba(100, 100, 150, 0.1);
            }

            tr.generic-row td.civ-name {
                color: #aaa;
                font-style: italic;
            }

            /* Missing civs row styles */
            tr.missing-row {
                background: rgba(80, 80, 80, 0.2);
            }

            tr.missing-row td {
                color: #666;
                font-style: italic;
            }

            tr.missing-row td.civ-name {
                color: #888;
                cursor: help;
            }

            .legend {
                display: flex;
                gap: 20px;
                justify-content: center;
                margin-bottom: 20px;
                flex-wrap: wrap;
            }

            .legend-item {
                display: flex;
                align-items: center;
                gap: 8px;
                font-size: 0.85rem;
            }

            .legend-color {
                width: 20px;
                height: 20px;
                border-radius: 4px;
            }

            .legend-better {
                background: rgba(46, 204, 113, 0.5);
            }
            .legend-worse {
                background: rgba(231, 76, 60, 0.5);
            }

            .loading {
                text-align: center;
                padding: 60px;
                font-size: 1.2rem;
                color: #888;
            }

            .loading::after {
                content: "";
                animation: dots 1.5s infinite;
            }

            @keyframes dots {
                0%,
                20% {
                    content: ".";
                }
                40% {
                    content: "..";
                }
                60%,
                100% {
                    content: "...";
                }
            }

            .no-unit {
                text-align: center;
                padding: 80px 20px;
                color: #666;
            }

            .no-unit h2 {
                font-family: "Cinzel", serif;
                font-size: 1.5rem;
                margin-bottom: 10px;
            }

            /* Tooltip styles */
            .tooltip {
                position: fixed;
                background: linear-gradient(145deg, #2a2a4a, #1a1a3a);
                border: 1px solid var(--secondary-color);
                color: white;
                padding: 10px 14px;
                border-radius: 8px;
                font-size: 0.85rem;
                max-width: 350px;
                z-index: 1000;
                pointer-events: none;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
                line-height: 1.4;
            }

            .tooltip-title {
                color: var(--secondary-color);
                font-weight: 600;
                margin-bottom: 5px;
                font-size: 0.9rem;
            }

            .tooltip-list {
                max-height: 200px;
                overflow-y: auto;
                margin-top: 5px;
            }

            .tooltip-baseline {
                color: #aaa;
                font-size: 0.8rem;
                margin-top: 5px;
                padding-top: 5px;
                border-top: 1px solid rgba(255, 255, 255, 0.1);
            }

            /* Filter input */
            .filter-container {
                margin-bottom: 15px;
            }

            .filter-input {
                padding: 10px 15px;
                font-size: 1rem;
                background: rgba(255, 255, 255, 0.1);
                border: 2px solid rgba(255, 255, 255, 0.2);
                border-radius: 8px;
                color: white;
                width: 250px;
                transition: border-color 0.2s;
            }

            .filter-input:focus {
                outline: none;
                border-color: var(--secondary-color);
            }

            .filter-input::placeholder {
                color: #666;
            }

            @media (max-width: 768px) {
                h1 {
                    font-size: 2rem;
                }
                .unit-btn {
                    padding: 10px 16px;
                    font-size: 0.9rem;
                }
                table {
                    font-size: 0.8rem;
                }
                td,
                th {
                    padding: 8px;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <header>
                <h1>Age of Empires II Unit Analyzer</h1>
                <p class="subtitle">
                    Compare unit stats across civilizations - hover for details
                </p>
            </header>

            <div class="unit-selector">
                {% for unit in units %}
                <button class="unit-btn" data-unit="{{ unit.id }}">
                    {{ unit.name }}
                </button>
                {% endfor %}
            </div>

            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color legend-better"></div>
                    <span>Better than baseline (hover for bonus)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color legend-worse"></div>
                    <span>Worse than baseline</span>
                </div>
            </div>

            <div id="content">
                <div class="no-unit">
                    <h2>Select a unit type above to begin</h2>
                    <p>
                        Click on any unit button to see civilization-specific
                        stats and bonuses
                    </p>
                </div>
            </div>

            <!-- Tooltip element -->
            <div id="tooltip" class="tooltip" style="display: none"></div>
        </div>

        <script>
            let currentData = null;
            let sortColumn = null;
            let sortDirection = "asc";
            const tooltip = document.getElementById("tooltip");

            // Column info for determining better/worse
            // Attack_Speed is attacks per second - higher = faster attacks = better
            const higherIsBetter = [
                "HP",
                "Attack",
                "Range",
                "Attack_Speed",
                "Melee_Armor",
                "Pierce_Armor",
                "Movement_Speed",
            ];
            const lowerIsBetter = [
                "Cost_Food",
                "Cost_Wood",
                "Cost_Gold",
                "Creation_Time",
                "Upgrade_Cost",
            ];

            // Columns to hide from display
            const hiddenColumns = ["Civ_Bonuses", "Unit"];

            document.querySelectorAll(".unit-btn").forEach((btn) => {
                btn.addEventListener("click", () => {
                    document
                        .querySelectorAll(".unit-btn")
                        .forEach((b) => b.classList.remove("active"));
                    btn.classList.add("active");
                    loadUnitData(btn.dataset.unit);
                });
            });

            async function loadUnitData(unitId) {
                const content = document.getElementById("content");
                content.innerHTML =
                    '<div class="loading">Loading unit data</div>';

                try {
                    const response = await fetch(`/api/unit/${unitId}`);
                    const data = await response.json();
                    currentData = data;
                    sortColumn = null;
                    renderTable();
                } catch (error) {
                    content.innerHTML =
                        '<div class="no-unit"><h2>Error loading data</h2><p>Please try again</p></div>';
                }
            }

            function isGenericCiv(row, unique_stats) {
                // A civ is "generic" if it has no unique stats (all baseline values) and no civ bonus
                const civBonus = row["Civ_Bonuses"];
                const hasBonus = civBonus && civBonus !== "-";

                if (hasBonus) return false;

                // Check if this civ has any unique stat values
                for (const col in unique_stats) {
                    if (row.Civilization in unique_stats[col].unique_civs) {
                        return false;
                    }
                }
                return true;
            }

            function renderTable() {
                if (!currentData) return;

                const {
                    records,
                    columns,
                    unique_stats,
                    total_civs,
                    missing_civs,
                } = currentData;

                // Filter out hidden columns
                const displayColumns = columns.filter(
                    (col) => !hiddenColumns.includes(col),
                );

                // Separate generic civs from unique civs
                const genericCivs = [];
                const uniqueCivRecords = [];

                for (const row of records) {
                    if (isGenericCiv(row, unique_stats)) {
                        genericCivs.push(row.Civilization);
                    } else {
                        uniqueCivRecords.push(row);
                    }
                }

                // Sort unique records if needed
                let sortedRecords = [...uniqueCivRecords];
                if (sortColumn) {
                    sortedRecords.sort((a, b) => {
                        let aVal = a[sortColumn];
                        let bVal = b[sortColumn];

                        // Handle null/undefined
                        if (aVal == null) return 1;
                        if (bVal == null) return -1;

                        // Numeric comparison
                        if (
                            typeof aVal === "number" &&
                            typeof bVal === "number"
                        ) {
                            return sortDirection === "asc"
                                ? aVal - bVal
                                : bVal - aVal;
                        }

                        // String comparison
                        aVal = String(aVal).toLowerCase();
                        bVal = String(bVal).toLowerCase();
                        if (sortDirection === "asc") {
                            return aVal.localeCompare(bVal);
                        }
                        return bVal.localeCompare(aVal);
                    });
                }

                const unitName =
                    document
                        .querySelector(".unit-btn.active")
                        ?.textContent?.trim() || "Unit";

                // Build the generic row data (use first generic civ's stats as template)
                let genericRowData = null;
                if (genericCivs.length > 0) {
                    // Find a generic civ record to use as template
                    const templateCiv = records.find((r) =>
                        genericCivs.includes(r.Civilization),
                    );
                    if (templateCiv) {
                        genericRowData = { ...templateCiv };
                        genericRowData._isGeneric = true;
                        genericRowData._genericCivs = genericCivs.sort();
                    }
                }

                let html = `
                <div class="table-container">
                    <div class="table-header">
                        <h2 class="table-title">${unitName} Stats by Civilization</h2>
                        <span class="civ-count">${total_civs} civilizations have this unit</span>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                ${displayColumns
                                    .map((col) => {
                                        let sortClass = "";
                                        if (sortColumn === col) {
                                            sortClass =
                                                sortDirection === "asc"
                                                    ? "sort-asc"
                                                    : "sort-desc";
                                        }
                                        return `<th class="${sortClass}" data-column="${col}">${formatColumnName(col)}</th>`;
                                    })
                                    .join("")}
                            </tr>
                        </thead>
                        <tbody>
                            ${genericRowData ? renderGenericRow(genericRowData, displayColumns) : ""}
                            ${sortedRecords.map((row) => renderRow(row, displayColumns, unique_stats)).join("")}
                            ${missing_civs && missing_civs.length > 0 ? renderMissingRow(missing_civs, displayColumns) : ""}
                        </tbody>
                    </table>
                </div>
            `;

                document.getElementById("content").innerHTML = html;

                // Add sort handlers
                document.querySelectorAll("thead th").forEach((th) => {
                    th.addEventListener("click", () => {
                        const col = th.dataset.column;
                        if (sortColumn === col) {
                            sortDirection =
                                sortDirection === "asc" ? "desc" : "asc";
                        } else {
                            sortColumn = col;
                            sortDirection = "asc";
                        }
                        renderTable();
                    });
                });

                // Add tooltip handlers
                setupTooltips();
            }

            function setupTooltips() {
                document.querySelectorAll("td[data-tooltip]").forEach((td) => {
                    td.addEventListener("mouseenter", showTooltip);
                    td.addEventListener("mousemove", moveTooltip);
                    td.addEventListener("mouseleave", hideTooltip);
                });
            }

            function showTooltip(e) {
                const td = e.target;
                const tooltipData = JSON.parse(td.dataset.tooltip);

                let html = "";
                if (tooltipData.title) {
                    html += `<div class="tooltip-title">${tooltipData.title}</div>`;
                }
                if (tooltipData.civList && tooltipData.civList.length > 0) {
                    html += `<div class="tooltip-list">${tooltipData.civList.join(", ")}</div>`;
                }
                if (tooltipData.bonus && tooltipData.bonus !== "-") {
                    html += `<div>${tooltipData.bonus}</div>`;
                }
                if (tooltipData.baseline !== undefined) {
                    html += `<div class="tooltip-baseline">Baseline: ${tooltipData.baseline}</div>`;
                }

                if (html) {
                    tooltip.innerHTML = html;
                    tooltip.style.display = "block";
                    moveTooltip(e);
                }
            }

            function moveTooltip(e) {
                const x = e.clientX + 15;
                const y = e.clientY + 15;

                // Keep tooltip on screen
                const rect = tooltip.getBoundingClientRect();
                const maxX = window.innerWidth - rect.width - 10;
                const maxY = window.innerHeight - rect.height - 10;

                tooltip.style.left = Math.min(x, maxX) + "px";
                tooltip.style.top = Math.min(y, maxY) + "px";
            }

            function hideTooltip() {
                tooltip.style.display = "none";
            }

            function formatColumnName(col) {
                return col.replace(/_/g, " ");
            }

            function renderGenericRow(row, columns) {
                const civCount = row._genericCivs.length;
                const tooltipData = {
                    title: `Generic Civs (${civCount})`,
                    civList: row._genericCivs,
                };

                return `<tr class="generic-row">
                ${columns
                    .map((col) => {
                        if (col === "Civilization") {
                            return `<td class="civ-name" data-tooltip='${JSON.stringify(tooltipData)}'>Generic (${civCount} civs)</td>`;
                        }
                        const value = row[col];
                        const displayValue =
                            value == null || value === "" ? "-" : value;
                        return `<td>${displayValue}</td>`;
                    })
                    .join("")}
            </tr>`;
            }

            function renderMissingRow(missingCivs, columns) {
                const tooltipData = {
                    title: `Missing Unit (${missingCivs.length} civs)`,
                    civList: missingCivs,
                };

                return `<tr class="missing-row">
                ${columns
                    .map((col) => {
                        if (col === "Civilization") {
                            return `<td class="civ-name" data-tooltip='${JSON.stringify(tooltipData)}'>Missing (${missingCivs.length} civs)</td>`;
                        }
                        return `<td>-</td>`;
                    })
                    .join("")}
            </tr>`;
            }

            function renderRow(row, columns, unique_stats) {
                return `<tr>${columns.map((col) => renderCell(row, col, unique_stats)).join("")}</tr>`;
            }

            function renderCell(row, col, unique_stats) {
                const value = row[col];
                const civBonus = row["Civ_Bonuses"];
                let classes = [];
                let tooltipData = {};

                if (col === "Civilization") {
                    classes.push("civ-name");
                    if (civBonus && civBonus !== "-") {
                        classes.push("has-bonus");
                        tooltipData = {
                            title: row.Civilization + " Bonuses",
                            bonus: civBonus,
                        };
                    }
                } else if (
                    unique_stats[col] &&
                    row.Civilization in unique_stats[col].unique_civs
                ) {
                    const baseline = unique_stats[col].baseline;
                    const isHigherBetter = higherIsBetter.includes(col);
                    const isLowerBetter = lowerIsBetter.includes(col);

                    if (isHigherBetter) {
                        classes.push(
                            value > baseline ? "unique-better" : "unique-worse",
                        );
                    } else if (isLowerBetter) {
                        classes.push(
                            value < baseline ? "unique-better" : "unique-worse",
                        );
                    } else {
                        classes.push("unique-different");
                    }

                    tooltipData = {
                        title: `${row.Civilization} - ${formatColumnName(col)}`,
                        baseline: baseline,
                    };

                    // Add civ bonus if this stat is affected by a bonus
                    if (civBonus && civBonus !== "-") {
                        tooltipData.bonus = civBonus;
                    }
                }

                const displayValue =
                    value == null || value === "" ? "-" : value;
                const tooltipAttr =
                    Object.keys(tooltipData).length > 0
                        ? `data-tooltip='${JSON.stringify(tooltipData)}'`
                        : "";

                return `<td class="${classes.join(" ")}" ${tooltipAttr}>${displayValue}</td>`;
            }
        </script>
    </body>
</html>
