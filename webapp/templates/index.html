{% extends 'base.html' %}

{% block title %}Unit Rankings — AoE2 Unit Analyzer{% endblock %}

{% block page_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/rankings.css') }}" />
{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Unit Rankings</h1>
    <p class="subtitle">Compare unit stats across civilizations</p>
</div>

<div class="container">
    <div class="age-toggle">
        <button class="age-btn" onclick="setAge('Castle')">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="vertical-align: -2px; margin-right: 2px">
                <rect x="4" y="2" width="6" height="10" rx="1" stroke="currentColor" stroke-width="1.2" fill="none"/>
                <rect x="1" y="5" width="3" height="7" rx="0.5" stroke="currentColor" stroke-width="1" fill="none"/>
                <rect x="10" y="5" width="3" height="7" rx="0.5" stroke="currentColor" stroke-width="1" fill="none"/>
            </svg>
            Castle Age
        </button>
        <button class="age-btn active" onclick="setAge('Imperial')">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="vertical-align: -2px; margin-right: 2px">
                <path d="M7 1L1 5v2h12V5L7 1z" stroke="currentColor" stroke-width="1.2" fill="none"/>
                <rect x="2" y="7" width="10" height="5" stroke="currentColor" stroke-width="1" fill="none"/>
                <rect x="5" y="9" width="4" height="3" stroke="currentColor" stroke-width="0.8" fill="none"/>
            </svg>
            Imperial Age
        </button>
    </div>
    <div id="lineSelector"></div>
    <div class="table-container" id="tableContainer"></div>
</div>
{% endblock %}

{% block page_js %}
<script src="{{ url_for('static', filename='js/rankings.js') }}"></script>
{% endblock %}
