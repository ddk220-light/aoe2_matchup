            rel="stylesheet"
        />
        <style>
            :root {
                --gold: #c9a84c;
                --gold-light: #dbb960;
                --gold-dark: #a07830;
                --red-accent: #7a1a1a;
                --red-deep: #4a0e0e;
                --bg: #2c1e10;
                --bg-deep: #1a1008;
                --card-bg: #3a2a18;
                --card-border: #5a4228;
                --text: #e8dcc8;
                --text-muted: #a89878;
                --parchment: #d4c4a0;
                --green: #5a9a3a;
                --red: #a83030;
                --team1: #e74c3c;
                --team2: #3498db;
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family: "Inter", sans-serif;
                background: var(--bg-deep);
                color: var(--text);
                min-height: 100vh;
                line-height: 1.5;
            }

            .page-header {
                padding: 16px 20px;
                background: linear-gradient(
                    180deg,
                    var(--red-deep) 0%,
                    var(--bg) 100%
                );
                border-bottom: 3px solid;
                border-image: linear-gradient(
                        90deg,
                        transparent 5%,
                        var(--gold-dark) 30%,
                        var(--gold) 50%,
                        var(--gold-dark) 70%,
                        transparent 95%
                    )
                    1;
                text-align: center;
            }
            .page-header h1 {
                font-family: "Cinzel", serif;
                font-size: 1.6rem;
                color: var(--gold);
                margin-bottom: 4px;
            }
            .page-header .subtitle {
                font-size: 0.85rem;
                color: var(--text-muted);
            }
            .nav-links {
                display: flex;
                gap: 10px;
                justify-content: center;
                margin-top: 10px;
            }
            .nav-link {
                color: var(--text);
                text-decoration: none;
                padding: 6px 14px;
                border-radius: 5px;
                background: rgba(255, 255, 255, 0.05);
                font-size: 0.8rem;
                transition: all 0.2s;
            }
            .nav-link:hover {
                background: rgba(201, 168, 76, 0.2);
            }
            .nav-link.active {
                background: var(--gold-dark);
                color: var(--bg-deep);
                font-weight: 600;
            }

            .container {
                max-width: 1400px;
                margin: 0 auto;
                padding: 16px 20px;
            }

            /* Age toggle */
            .age-toggle {
                display: flex;
                gap: 8px;
                justify-content: center;
                margin-bottom: 16px;
            }
            .age-btn {
                font-family: "Cinzel", serif;
                font-size: 0.85rem;
                padding: 8px 24px;
                border: 1px solid var(--card-border);
                border-radius: 6px;
                background: var(--card-bg);
                color: var(--text-muted);
                cursor: pointer;
                transition: all 0.2s;
            }
            .age-btn:hover {
                border-color: var(--gold-dark);
                color: var(--text);
            }
            .age-btn.active {
                background: var(--gold-dark);
                color: var(--bg-deep);
                border-color: var(--gold);
                font-weight: 600;
            }

            /* Building sections */
            .building-section {
                margin-bottom: 16px;
            }
            .building-header {
                display: flex;
                align-items: center;
                gap: 8px;
                margin-bottom: 8px;
            }
            .building-header img {
                width: 24px;
                height: 24px;
                border-radius: 4px;
            }
            .building-header h3 {
                font-family: "Cinzel", serif;
                font-size: 0.95rem;
                color: var(--gold);
            }

            /* Unit line cards */
            .line-grid {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                margin-bottom: 8px;
            }
            .line-card {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 8px 14px;
                background: var(--card-bg);
                border: 1px solid var(--card-border);
                border-radius: 8px;
                cursor: pointer;
                transition: all 0.2s;
                min-width: 140px;
            }
            .line-card:hover {
                border-color: var(--gold-dark);
                background: rgba(201, 168, 76, 0.1);
            }
            .line-card.active {
                border-color: var(--gold);
                background: rgba(201, 168, 76, 0.15);
                box-shadow: 0 0 8px rgba(201, 168, 76, 0.2);
            }
            .line-card img {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                border: 2px solid var(--card-border);
                object-fit: cover;
                background: var(--bg);
            }
            .line-card .line-name {
                font-size: 0.8rem;
                font-weight: 500;
            }
            .line-card .line-unique {
                color: var(--gold);
                font-size: 0.65rem;
            }
            .line-card.unavailable {
                opacity: 0.35;
                pointer-events: none;
            }

            /* Table container */
            .table-container {
                margin-top: 20px;
                overflow-x: auto;
            }
            .table-title {
                font-family: "Cinzel", serif;
                font-size: 1.1rem;
                color: var(--gold);
                margin-bottom: 10px;
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .table-title img {
                width: 28px;
                height: 28px;
                border-radius: 50%;
            }

            /* Stats table */
            .stats-table {
                width: 100%;
                border-collapse: collapse;
                font-size: 0.8rem;
                min-width: 900px;
            }
            .stats-table th {
                background: var(--card-bg);
                border: 1px solid var(--card-border);
                padding: 8px 10px;
                text-align: left;
                font-family: "Cinzel", serif;
                font-size: 0.75rem;
                color: var(--gold);
                cursor: pointer;
                user-select: none;
                white-space: nowrap;
                position: sticky;
                top: 0;
                z-index: 1;
            }
            .stats-table th:hover {
                background: rgba(201, 168, 76, 0.15);
            }
            .stats-table th .sort-arrow {
                font-size: 0.65rem;
                margin-left: 4px;
                opacity: 0.4;
            }
            .stats-table th.sorted .sort-arrow {
                opacity: 1;
                color: var(--gold-light);
            }
            .info-icon {
                font-size: 0.65rem;
                margin-left: 3px;
                opacity: 0.6;
                cursor: help;
                vertical-align: super;
            }
            .info-icon:hover {
                opacity: 1;
            }
            .stats-table td {
                border: 1px solid var(--card-border);
                padding: 6px 10px;
                white-space: nowrap;
            }
            .stats-table tr {
                background: var(--bg-deep);
                transition: background 0.15s;
            }
            .stats-table tr:hover {
                background: rgba(201, 168, 76, 0.08);
            }
            .stats-table tr.unique-row {
                border-left: 3px solid var(--gold);
                background: rgba(201, 168, 76, 0.05);
            }
            .stats-table tr.unique-row td:first-child {
                padding-left: 20px;
            }
            .stats-table tr.missing-row {
                opacity: 0.35;
            }

            /* Cell coloring */
            .val-high {
                color: #6fbf6f;
            }
            .val-low {
                color: #bf6f6f;
            }

            /* Civ cell */
            .civ-cell {
                display: flex;
                align-items: center;
                gap: 6px;
            }
            .civ-cell img {
                width: 22px;
                height: 22px;
                border-radius: 50%;
                object-fit: cover;
            }

            /* Unit cell */
            .unit-cell {
                display: flex;
                align-items: center;
                gap: 6px;
                position: relative;
            }
            .unit-cell img {
                width: 24px;
                height: 24px;
                border-radius: 50%;
                border: 1px solid var(--card-border);
                object-fit: cover;
                background: var(--bg);
            }

            /* Hover card */
            .hover-card {
                display: none;
                position: fixed;
                background: var(--bg);
                border: 1px solid var(--gold-dark);
                border-radius: 8px;
                padding: 10px 14px;
                font-size: 0.72rem;
                color: var(--text);
                white-space: normal;
                min-width: 230px;
                max-width: 340px;
                z-index: 200;
                box-shadow: 0 6px 16px rgba(0, 0, 0, 0.6);
                pointer-events: none;
            }
            .hover-card.visible {
                display: block;
            }
            .hover-card.pinned {
                pointer-events: auto;
            }
            .hover-card .hc-title {
                font-family: "Cinzel", serif;
                font-size: 0.8rem;
                color: var(--gold);
                margin-bottom: 6px;
                border-bottom: 1px solid var(--card-border);
                padding-bottom: 4px;
            }
            .hover-card .hc-formula {
                color: var(--text-muted);
                font-size: 0.65rem;
                margin-bottom: 6px;
            }
            .hover-card .hc-row {
                display: flex;
                justify-content: space-between;
                padding: 2px 0;
                gap: 12px;
            }
            .hover-card .hc-row.highlight {
                color: var(--gold-light);
                font-weight: 600;
            }
            .hover-card .hc-row.total {
                margin-top: 4px;
                border-top: 1px solid var(--card-border);
                padding-top: 4px;
                font-weight: 600;
            }
            .hover-card .hc-sim-link {
                color: var(--gold);
                text-decoration: underline;
                cursor: pointer;
                font-size: 0.65rem;
                display: inline-block;
                margin-bottom: 4px;
            }
            .hover-card .hc-sim-link:hover {
                color: var(--gold-light);
            }
            .hover-card .hc-close {
                position: absolute;
                top: 4px;
                right: 8px;
                cursor: pointer;
                color: var(--text-muted);
                font-size: 0.9rem;
                line-height: 1;
            }
            .hover-card .hc-close:hover {
                color: var(--text);
            }
            .hover-card .hc-loading {
                color: var(--text-muted);
                font-style: italic;
                padding: 8px 0;
            }
            td.hc-cell {
                cursor: pointer;
                position: relative;
            }

            /* Civ filter */
            .civ-filter-wrap {
                margin-bottom: 10px;
            }
            .civ-filter-wrap input {
                width: 240px;
                padding: 6px 12px;
                background: var(--bg);
                border: 1px solid var(--card-border);
                color: var(--text);
                border-radius: 6px;
                font-size: 0.8rem;
            }
            .civ-filter-wrap input::placeholder {
                color: var(--text-muted);
            }

            @media (max-width: 768px) {
                .page-header h1 {
                    font-size: 1.2rem;
                }
                .line-grid {
                    gap: 6px;
                }
                .line-card {
                    min-width: 120px;
                    padding: 6px 10px;
                }
                .line-card img {
                    width: 24px;
                    height: 24px;
                }
                .line-card .line-name {
                    font-size: 0.7rem;
                }
            }
        </style>
    </head>

            // ===== HOVER CARD MANAGER =====
            function getHoverCardEl() {
                let el = document.getElementById("hoverCard");
                if (!el) {
                    el = document.createElement("div");
                    el.id = "hoverCard";
                    el.className = "hover-card";
                    document.body.appendChild(el);
                }
                return el;
            }

            function positionHoverCard(targetEl) {
                const hc = getHoverCardEl();
                const rect = targetEl.getBoundingClientRect();
                const hcRect = hc.getBoundingClientRect();
                let top = rect.top - hcRect.height - 8;
                let left = rect.left + rect.width / 2 - hcRect.width / 2;
                if (top < 4) top = rect.bottom + 8;
                if (left < 4) left = 4;
                if (left + hcRect.width > window.innerWidth - 4)
                    left = window.innerWidth - hcRect.width - 4;
                hc.style.top = top + "px";
                hc.style.left = left + "px";
            }

            function showHoverCard(targetEl, html) {
                if (pinnedCell) return;
                const hc = getHoverCardEl();
                hc.innerHTML = html;
                hc.classList.add("visible");
                hc.classList.remove("pinned");
                positionHoverCard(targetEl);
            }

            function hideHoverCard() {
                if (pinnedCell) return;
                const hc = getHoverCardEl();
                hc.classList.remove("visible");
            }

            function pinHoverCard(targetEl, html) {
                const hc = getHoverCardEl();
                if (pinnedCell === targetEl) {
                    unpinHoverCard();
                    return;
                }
                pinnedCell = targetEl;
                hc.innerHTML =
                    `<span class="hc-close" onclick="unpinHoverCard()">&times;</span>` +
                    html;
                hc.classList.add("visible", "pinned");
                positionHoverCard(targetEl);
            }

            function unpinHoverCard() {
                pinnedCell = null;
                const hc = getHoverCardEl();
                hc.classList.remove("visible", "pinned");
            }

            document.addEventListener("click", (e) => {
                if (!pinnedCell) return;
                const hc = getHoverCardEl();
                if (hc.contains(e.target)) return;
                if (e.target.closest("td.hc-cell")) return;
                unpinHoverCard();
            });

            async function getStatChain(refUnitId) {
                if (statChainCache[refUnitId]) return statChainCache[refUnitId];
                const resp = await fetch(`/api/ref/stat-chain/${refUnitId}`);
                const data = await resp.json();
                statChainCache[refUnitId] = data;
                return data;

            const STAT_CHAIN_MAP = {
                final_hp: "hp",
                final_attack: "attack",
                final_melee_armor: "melee_armor",
                final_pierce_armor: "pierce_armor",
                dps: "attack",
            };

            function buildStatHoverHtml(row, statKey, chainData) {
                if (statKey === "total_cost") {
                    let html = `<div class="hc-title">Unit Cost Breakdown</div>`;
                    const f = row.final_cost_food || 0,
                        w = row.final_cost_wood || 0,
                        g = row.final_cost_gold || 0;
                    if (f)
                        html += `<div class="hc-row"><span>Food</span><span>${f}</span></div>`;
                    if (w)
                        html += `<div class="hc-row"><span>Wood</span><span>${w}</span></div>`;
                    if (g)
                        html += `<div class="hc-row"><span>Gold</span><span>${g}</span></div>`;
                    html += `<div class="hc-row total"><span>Total</span><span>${row.total_cost}</span></div>`;
                    return html;
                }

                if (statKey === "total_upgrade_cost") {
                    let html = `<div class="hc-title">Upgrade Cost Breakdown</div>`;
                    const f = row.upgrade_cost_food || 0,
                        w = row.upgrade_cost_wood || 0,
                        g = row.upgrade_cost_gold || 0;

                        html += `<div class="hc-row"><span>Food</span><span>${f}</span></div>`;

                        html += `<div class="hc-row"><span>Wood</span><span>${w}</span></div>`;

                        html += `<div class="hc-row"><span>Gold</span><span>${g}</span></div>`;
                    html += `<div class="hc-row total"><span>Total</span><span>${row.total_upgrade_cost}</span></div>`;
                    return html;
                }

                const chain = chainData.stat_chain || [];
                if (!chain.length) return `<div class="hc-title">No data</div>`;

                if (statKey === "dps") {
                    let html = `<div class="hc-title">DPS Breakdown</div>`;
                    html += `<div class="hc-formula">Attack \u00f7 Reload Time</div>`;
                    for (let i = 0; i < chain.length; i++) {
                        const step = chain[i];
                        const atk = step.attack || 0;
                        const rld = step.reload_time || 1;
                        const dps = rld > 0 ? atk / rld : 0;
                        if (i === 0) {
                            const hl =
                                step.tech_type === "civ_bonus" ||
                                step.tech_type === "unique_tech"
                                    ? " highlight"
                                    : "";
                            html += `<div class="hc-row${hl}"><span>${step.tech_name}</span><span>${dps.toFixed(2)}</span></div>`;
                        } else {
                            const prev = chain[i - 1];
                            const prevAtk = prev.attack || 0;
                            const prevRld = prev.reload_time || 1;
                            if (atk !== prevAtk || rld !== prevRld) {
                                const hl =
                                    step.tech_type === "civ_bonus" ||
                                    step.tech_type === "unique_tech"
                                        ? " highlight"
                                        : "";
                                const delta =
                                    dps - (prevRld > 0 ? prevAtk / prevRld : 0);
                                const sign = delta >= 0 ? "+" : "";
                                html += `<div class="hc-row${hl}"><span>${step.tech_name}</span><span>${dps.toFixed(2)} (${sign}${delta.toFixed(2)})</span></div>`;
                            }
                        }
                    }
                    const finalDps = row.dps || 0;
                    html += `<div class="hc-row total"><span>Final DPS</span><span>${finalDps.toFixed(2)}</span></div>`;
                    return html;
                }

                // Standard stat (hp, attack, melee_armor, pierce_armor)
                const chainKey = STAT_CHAIN_MAP[statKey] || statKey;
                const label =
                    {
                        final_hp: "HP",
                        final_attack: "Attack",
                        final_melee_armor: "Melee Armor",
                        final_pierce_armor: "Pierce Armor",
                    }[statKey] || statKey;
                let html = `<div class="hc-title">${label} Breakdown</div>`;
                for (let i = 0; i < chain.length; i++) {
                    const step = chain[i];
                    const val = step[chainKey];
                    if (i === 0) {
                        const hl =
                            step.tech_type === "civ_bonus" ||
                            step.tech_type === "unique_tech"
                                ? " highlight"
                                : "";
                        html += `<div class="hc-row${hl}"><span>${step.tech_name}</span><span>${val}</span></div>`;
                    } else {
                        const prev = chain[i - 1];
                        const prevVal = prev[chainKey];
                        if (val !== prevVal) {
                            const delta = val - prevVal;
                            const sign = delta >= 0 ? "+" : "";
                            const hl =
                                step.tech_type === "civ_bonus" ||
                                step.tech_type === "unique_tech"
                                    ? " highlight"
                                    : "";
                            html += `<div class="hc-row${hl}"><span>${step.tech_name}</span><span>${sign}${delta} \u2192 ${val}</span></div>`;
                        }
                    }
                }
                html += `<div class="hc-row total"><span>Final</span><span>${row[statKey]}</span></div>`;
                return html;
            }

                        buildStatHoverHtml(row, key, {}),
                    );
                    return;
                }
                const td = e.currentTarget;
                pinHoverCard(td, `<div class="hc-loading">Loading...</div>`);

            // ===== RENDERING =====
            function setAge(age) {
                currentAge = age;
                document.querySelectorAll(".age-btn").forEach((btn) => {
                    btn.classList.toggle(
                        "active",
                        btn.textContent.includes(age),

                });
                renderLineSelector();
                if (currentData) renderTable();

            function renderLineSelector() {
                const container = document.getElementById("lineSelector");
                let html = "";
                const groups = {};
                for (const [slug, line] of Object.entries(UNIT_LINES)) {
                    const bldg = line.building;
                    if (!groups[bldg]) groups[bldg] = [];
                    groups[bldg].push({ slug, ...line });
                }

                for (const bldg of BUILDING_ORDER) {
                    const lines = groups[bldg];
                    if (!lines) continue;
                    const bIconId = BUILDING_ICONS[bldg];
                    html += `<div class="building-section">
                        <div class="building-header">
                            <img src="${iconUrl(bIconId)}" alt="${bldg}" onerror="this.style.display='none'" />
                            <h3>${bldg}</h3>
                        </div>
                        <div class="line-grid">`;

                    for (const line of lines) {
                        const displayName =
                            currentAge === "Castle"
                                ? line.castle
                                : line.imperial;
                        const hasCastle = line.castle !== null;
                        const unavailable =
                            currentAge === "Castle" && !hasCastle;
                        const iUrl = unitIconUrl(displayName || line.imperial);
                        const activeClass =
                            currentLine === line.slug ? " active" : "";
                        const unavailClass = unavailable ? " unavailable" : "";

                        html += `<div class="line-card${activeClass}${unavailClass}" onclick="selectLine('${line.slug}')">
                            <img src="${iUrl}" alt="${line.name}" onerror="if(!this.dataset.tried){this.dataset.tried='1';const id=NAME_TO_ICON[this.alt];if(id)this.src=ICON_BASE_FALLBACK+id+'.png';else this.style.display='none'}else{this.style.display='none'}" />
                            <div>
                                <div class="line-name">${line.name}</div>
                                ${line.hasUnique ? '<div class="line-unique">+ unique units</div>' : ""}
                            </div>
                        </div>`;
                    }
                    html += "</div></div>";
                }
                container.innerHTML = html;

            const INFANTRY_SLUGS = new Set([

                const cards = document.querySelectorAll(".line-card");
                cards.forEach((c) => {
                    if (c.getAttribute("onclick")?.includes(`'${slug}'`))
                        c.classList.add("active");
                });

                const resp = await fetch(`/api/ref/unit-line/${slug}`);
                currentData = await resp.json();
                sortColumn =
                    slug === "anti_cav_infantry"
                        ? "anti_cav_value"
                        : slug === "raiding_infantry"
                          ? "raiding_value"
                          : slug === "anti_archer"
                            ? "anti_archer"
                            : slug === "mobility"
                              ? "mobility_score"
                              : INFANTRY_SLUGS.has(slug)
                                ? "militia_value"
                                : ARCHERY_SLUGS.has(slug)
                                  ? "ranged_power"
                                  : "pes";
                sortDir = "desc";
                renderTable();

            function renderTable() {

                    return;
                }

                // Compute derived fields
                const enriched = rows.map((r) => {
                    const dps =
                        r.final_reload_time > 0
                            ? Math.round(
                                  (r.final_attack / r.final_reload_time) * 10,
                              ) / 10
                            : 0;
                    const totalCost =
                        (r.final_cost_food || 0) +
                        (r.final_cost_wood || 0) +
                        (r.final_cost_gold || 0);
                    const totalArmor =
                        1 +
                        (r.final_melee_armor || 0) +
                        (r.final_pierce_armor || 0);
                    // PES: Pop Efficient Score (all 30v30 fixed-count battles)
                    const pesWeights = [
                        [r.score_30v30, 0.25],
                        [r.pop_vs_champ, 0.25],
                        [r.pop_vs_paladin, 0.25],
                        [r.pop_vs_arb, 0.25],
                    ];
                    let pesSum = 0,
                        pesTotal = 0;
                    for (const [s, w] of pesWeights) {
                        if (s > -999) {
                            pesSum += s * w;
                            pesTotal += w;
                        }
                    }
                    const pes =
                        pesTotal > 0
                            ? Math.round((pesSum / pesTotal) * 10) / 10
                            : -999;

                    // RES: Resource Efficient Score (resource-based battles)
                    const resWeights = [
                        [r.score_3k, 0.2],
                        [r.score_5k, 0.15],
                        [r.vs_champ, 0.217],
                        [r.vs_paladin, 0.217],
                        [r.vs_arb, 0.217],
                    ];
                    let resSum = 0,
                        resTotal = 0;
                    for (const [s, w] of resWeights) {
                        if (s > -999) {
                            resSum += s * w;
                            resTotal += w;
                        }
                    }
                    const res =
                        resTotal > 0
                            ? Math.round((resSum / resTotal) * 10) / 10
                            : -999;

                    return {
                        ...r,
                        dps,
                        pes,
                        res,
                        total_cost: totalCost,
                        total_upgrade_cost:
                            (r.upgrade_cost_food || 0) +
                            (r.upgrade_cost_wood || 0) +
                            (r.upgrade_cost_gold || 0),
                        dps_per_cost:

                    const isScore = SCORE_KEYS.has(k);
                    const isStat = STAT_KEYS.has(k);
                    const hcClass = isScore || isStat ? " hc-cell" : "";

                    let formatted;
                    if (k === "dps_per_cost") formatted = v.toFixed(3);
                    else if (k === "final_speed") formatted = v.toFixed(2);
                    else if (
                        k === "dps" ||
                        k === "ehp_per_cost" ||
                        k === "militia_value" ||
                        k === "melee_power" ||
                        k === "meat_shield" ||
                        k === "raid" ||
                        k === "anti_cav" ||
                        k === "anti_cav_value" ||
                        k === "anti_cav_total" ||
                        k === "frontline" ||
                        k === "raiding_value" ||
                        k === "raid_speed" ||
                        k === "raid_vill_kill" ||
                        k === "raid_building" ||
                        k === "raid_vs_tc_dps" ||
                        k === "raid_vs_castle_dps" ||
                        k === "mobility_score" ||
                        k === "mobility_speed_dps" ||
                        k === "mobility_pierce_armor" ||
                        k === "mobility_hp"
                    )
                        formatted = v.toFixed(1);
                    else if (k === "total_cost" || k === "total_upgrade_cost")
                        formatted = Math.round(v);
                    else if (typeof v === "number" && v === Math.floor(v))
                        formatted = Math.round(v);
                    else formatted = typeof v === "number" ? v.toFixed(1) : v;

                    if (isScore) {
                        return `<td class="${cls}${hcClass}" onmouseenter="onScoreCellEnter(event,${rowIdx},'${k}')" onmouseleave="onScoreCellLeave()" onclick="onScoreCellClick(event,${rowIdx},'${k}')">${formatted}</td>`;
                    }
                    if (isStat) {
                        return `<td class="${cls}${hcClass}" onmouseenter="onStatCellEnter(event,${rowIdx},'${k}')" onmouseleave="onStatCellLeave()" onclick="onStatCellClick(event,${rowIdx},'${k}')">${formatted}</td>`;
                    }
                    return `<td class="${cls}">${formatted}</td>`;
                }

                for (let i = 0; i < filtered.length; i++) {
                    const row = filtered[i];
                    const rowClass = row.is_unique ? "unique-row" : "";
                    html += `<tr class="${rowClass}">`;
                    for (const col of columns) {
                        html += fmtCell(col, row, i);
                    }
                    html += "</tr>";
                }

                html += "</tbody></table>";
                container.innerHTML = html;

                // Restore focus to filter input if it was active
                if (civFilter) {
                    const inp = document.getElementById("civFilterInput");
                    if (inp) {
                        inp.focus();
                        inp.selectionStart = inp.selectionEnd =
                            inp.value.length;
                    }
                }
            }

            function sortBy(column) {
                if (sortColumn === column) {
                    sortDir = sortDir === "asc" ? "desc" : "asc";
                } else {
                    sortColumn = column;
                    sortDir =
                        column === "civ_name" || column === "unit_name"
                            ? "asc"
                            : "desc";
                }
                renderTable();
            }

            // ===== INIT =====
            renderLineSelector();
        </script>
    </body>
</html>
