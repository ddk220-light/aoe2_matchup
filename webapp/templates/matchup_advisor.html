<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Matchup Advisor - AoE2 Unit Analyzer</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Oxygen, Ubuntu, sans-serif;
                background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
                color: #e4e4e4;
                min-height: 100vh;
                padding: 20px;
            }

            .container {
                max-width: 1400px;
                margin: 0 auto;
            }

            header {
                text-align: center;
                margin-bottom: 30px;
            }

            h1 {
                font-size: 2.5rem;
                background: linear-gradient(90deg, #ffd700, #ff8c00);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                margin-bottom: 10px;
            }

            .subtitle {
                color: #888;
                font-size: 1.1rem;
            }

            .nav-links {
                display: flex;
                justify-content: center;
                gap: 20px;
                margin-top: 20px;
                flex-wrap: wrap;
            }

            .nav-link {
                color: #888;
                text-decoration: none;
                padding: 8px 16px;
                border-radius: 20px;
                transition: all 0.3s;
            }

            .nav-link:hover {
                color: #ffd700;
                background: rgba(255, 215, 0, 0.1);
            }
            .nav-link.active {
                color: #ffd700;
                background: rgba(255, 215, 0, 0.2);
            }

            .civ-selector {
                text-align: center;
                margin-bottom: 20px;
            }

            .civ-selector h3 {
                margin-bottom: 12px;
                font-size: 1.1rem;
            }

            .civ-selector .step-label {
                display: inline-block;
                padding: 4px 14px;
                border-radius: 12px;
                font-size: 0.85rem;
                margin-bottom: 10px;
            }

            .civ-selector .step-civ1 {
                background: rgba(255, 107, 107, 0.15);
                color: #ff6b6b;
            }
            .civ-selector .step-civ2 {
                background: rgba(78, 205, 196, 0.15);
                color: #4ecdc4;
            }

            .civ-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
                gap: 10px;
                max-width: 900px;
                margin: 0 auto;
            }

            .civ-card {
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 10px 6px 8px;
                background: rgba(255, 255, 255, 0.05);
                border: 2px solid rgba(255, 255, 255, 0.1);
                border-radius: 8px;
                cursor: pointer;
                transition: all 0.25s ease;
                text-decoration: none;
                color: #e4e4e4;
            }

            .civ-card:hover {
                transform: translateY(-2px);
                border-color: rgba(255, 215, 0, 0.3);
                box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            }

            .civ-card.selected-civ1 {
                border-color: #ff6b6b;
                background: rgba(255, 107, 107, 0.15);
                box-shadow: 0 0 12px rgba(255, 107, 107, 0.3);
            }

            .civ-card.selected-civ2 {
                border-color: #4ecdc4;
                background: rgba(78, 205, 196, 0.15);
                box-shadow: 0 0 12px rgba(78, 205, 196, 0.3);
            }

            .civ-card.disabled {
                opacity: 0.35;
                pointer-events: none;
            }

            .civ-emblem {
                width: 44px;
                height: 44px;
                border-radius: 50%;
                border: 2px solid rgba(255, 215, 0, 0.4);
                object-fit: cover;
                background: rgba(0, 0, 0, 0.3);
                margin-bottom: 5px;
            }

            .civ-card-name {
                font-size: 0.75rem;
                text-align: center;
                line-height: 1.2;
            }

            .selected-display {
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 20px;
                margin: 15px 0;
                font-size: 1.1rem;
                min-height: 40px;
            }

            .selected-display .civ1-pick {
                color: #ff6b6b;
                font-weight: 600;
            }
            .selected-display .civ2-pick {
                color: #4ecdc4;
                font-weight: 600;
            }
            .selected-display .vs-text {
                color: #666;
            }

            select {
                width: 100%;
                padding: 12px;
                border: 1px solid rgba(255, 255, 255, 0.2);
                border-radius: 8px;
                background: rgba(0, 0, 0, 0.3);
                color: #e4e4e4;
                font-size: 1rem;
                cursor: pointer;
            }

            select:focus {
                outline: none;
                border-color: #ffd700;
            }

            .compare-btn {
                display: block;
                margin: 10px auto 20px;
                padding: 15px 40px;
                background: linear-gradient(90deg, #ffd700, #ff8c00);
                border: none;
                border-radius: 25px;
                color: #1a1a2e;
                font-size: 1.1rem;
                font-weight: bold;
                cursor: pointer;
                transition:
                    transform 0.2s,
                    box-shadow 0.2s;
            }

            .compare-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
            }
            .compare-btn:disabled {
                opacity: 0.5;
                cursor: not-allowed;
                transform: none;
            }

            @media (max-width: 600px) {
                .civ-grid {
                    grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
                    gap: 8px;
                }
                .civ-emblem {
                    width: 36px;
                    height: 36px;
                }
                .civ-card-name {
                    font-size: 0.7rem;
                }
            }

            .results-container {
                display: none;
            }
            .results-container.visible {
                display: block;
            }

            .matchup-header {
                text-align: center;
                margin-bottom: 30px;
                padding: 20px;
                background: rgba(255, 255, 255, 0.05);
                border-radius: 12px;
            }

            .matchup-header h2 {
                font-size: 1.8rem;
                margin-bottom: 10px;
            }
            .matchup-header .civ1-name {
                color: #ff6b6b;
            }
            .matchup-header .civ2-name {
                color: #4ecdc4;
            }

            .loading {
                text-align: center;
                padding: 60px;
                color: #888;
                font-size: 1.2rem;
            }

            .loading .spinner {
                display: inline-block;
                width: 40px;
                height: 40px;
                border: 3px solid rgba(255, 215, 0, 0.2);
                border-top-color: #ffd700;
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
                margin-bottom: 15px;
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            .age-tab-bar {
                display: flex;
                justify-content: center;
                gap: 10px;
                margin-bottom: 25px;
            }

            .age-tab {
                padding: 10px 24px;
                border-radius: 20px;
                cursor: pointer;
                background: rgba(255, 255, 255, 0.05);
                color: #888;
                border: 1px solid transparent;
                transition: all 0.3s;
                font-size: 1rem;
            }

            .age-tab:hover {
                color: #ffd700;
                background: rgba(255, 215, 0, 0.1);
            }

            .age-tab.active {
                color: #ffd700;
                background: rgba(255, 215, 0, 0.15);
                border-color: rgba(255, 215, 0, 0.3);
            }

            .age-content {
                display: none;
            }
            .age-content.active {
                display: block;
            }

            .phase-card {
                background: rgba(255, 255, 255, 0.05);
                border-radius: 12px;
                padding: 20px;
                margin-bottom: 20px;
            }

            .phase-card h3 {
                color: #ffd700;
                margin-bottom: 15px;
                font-size: 1.2rem;
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .phase-num {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 28px;
                height: 28px;
                border-radius: 50%;
                background: rgba(255, 215, 0, 0.2);
                color: #ffd700;
                font-size: 0.85rem;
                font-weight: bold;
                flex-shrink: 0;
            }

            .callout {
                padding: 12px 16px;
                border-radius: 8px;
                margin-top: 12px;
                font-weight: 500;
            }

            .callout.civ1 {
                background: rgba(255, 107, 107, 0.15);
                border-left: 3px solid #ff6b6b;
                color: #ff9999;
            }

            .callout.civ2 {
                background: rgba(78, 205, 196, 0.15);
                border-left: 3px solid #4ecdc4;
                color: #8ee8e2;
            }

            .callout.neutral {
                background: rgba(255, 215, 0, 0.1);
                border-left: 3px solid #ffd700;
                color: #ffe066;
            }

            /* Mobile grid */
            .mobile-grid {
                display: grid;
                gap: 3px;
                margin-top: 12px;
                overflow-x: auto;
            }

            .grid-cell {
                padding: 6px 8px;
                text-align: center;
                font-size: 0.8rem;
                border-radius: 4px;
                white-space: nowrap;
            }

            .grid-cell.header {
                background: rgba(255, 255, 255, 0.08);
                color: #aaa;
                font-weight: 600;
            }
            .grid-cell.win {
                background: rgba(76, 175, 80, 0.3);
                color: #81c784;
            }
            .grid-cell.loss {
                background: rgba(244, 67, 54, 0.3);
                color: #ef9a9a;
            }
            .grid-cell.draw {
                background: rgba(158, 158, 158, 0.2);
                color: #bdbdbd;
            }

            /* Combo selection */
            .combo-section {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 20px;
                margin-top: 15px;
            }

            @media (max-width: 768px) {
                .combo-section {
                    grid-template-columns: 1fr;
                }
            }

            .combo-box {
                background: rgba(0, 0, 0, 0.2);
                border-radius: 8px;
                padding: 15px;
            }

            .combo-box.civ1-box {
                border-left: 4px solid #ff6b6b;
            }
            .combo-box.civ2-box {
                border-left: 4px solid #4ecdc4;
            }

            .combo-box h4 {
                margin-bottom: 12px;
                font-size: 1.05rem;
            }
            .combo-box.civ1-box h4 {
                color: #ff6b6b;
            }
            .combo-box.civ2-box h4 {
                color: #4ecdc4;
            }

            .combo-option {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 8px 10px;
                border-radius: 6px;
                margin-bottom: 6px;
                cursor: pointer;
                transition: background 0.2s;
            }

            .combo-option:hover {
                background: rgba(255, 255, 255, 0.05);
            }

            .combo-option input[type="radio"] {
                accent-color: #ffd700;
                width: 16px;
                height: 16px;
                flex-shrink: 0;
            }

            .combo-option .combo-label {
                flex: 1;
            }

            .combo-option .combo-units {
                font-weight: 500;
            }

            .combo-option .combo-reasoning {
                font-size: 0.8rem;
                color: #888;
                margin-top: 2px;
            }

            .combo-option .combo-score {
                font-size: 0.85rem;
                color: #ffd700;
                font-weight: 600;
                white-space: nowrap;
            }

            .combo-option.recommended {
                background: rgba(255, 215, 0, 0.08);
                border: 1px solid rgba(255, 215, 0, 0.2);
            }

            .custom-combo {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                align-items: center;
                padding: 8px 10px;
                margin-bottom: 10px;
            }

            .custom-combo select {
                width: auto;
                min-width: 140px;
                padding: 8px;
                font-size: 0.85rem;
            }

            .custom-combo .plus {
                color: #888;
                font-weight: bold;
            }

            .submit-btn {
                display: block;
                width: 100%;
                padding: 10px;
                background: rgba(255, 215, 0, 0.2);
                border: 1px solid rgba(255, 215, 0, 0.3);
                border-radius: 8px;
                color: #ffd700;
                font-size: 0.95rem;
                cursor: pointer;
                transition: all 0.2s;
                margin-top: 8px;
            }

            .submit-btn:hover {
                background: rgba(255, 215, 0, 0.3);
            }

            .submit-btn:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

            .submit-btn.submitted {
                background: rgba(76, 175, 80, 0.2);
                border-color: rgba(76, 175, 80, 0.3);
                color: #81c784;
            }

            /* Phase 4 army results */
            .army-results {
                margin-top: 15px;
            }

            .army-result-row {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 8px 12px;
                border-radius: 6px;
                margin-bottom: 4px;
                background: rgba(0, 0, 0, 0.15);
            }

            .army-result-row .combo-desc {
                font-size: 0.9rem;
                flex: 1;
            }
            .army-result-row .combo-desc .c1 {
                color: #ff9999;
            }
            .army-result-row .combo-desc .c2 {
                color: #8ee8e2;
            }

            .army-winner {
                font-size: 0.85rem;
                font-weight: 600;
                padding: 3px 10px;
                border-radius: 12px;
            }

            .army-winner.civ1-win {
                background: rgba(255, 107, 107, 0.2);
                color: #ff9999;
            }
            .army-winner.civ2-win {
                background: rgba(78, 205, 196, 0.2);
                color: #8ee8e2;
            }
            .army-winner.draw-result {
                background: rgba(158, 158, 158, 0.2);
                color: #bdbdbd;
            }

            .no-data {
                color: #666;
                font-style: italic;
                padding: 20px;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <header>
                <h1>Matchup Advisor</h1>
                <p class="subtitle">
                    Strategic army composition analysis for any civ matchup
                </p>
                <nav class="nav-links">
                    <a href="/" class="nav-link">Home</a>
                    <a href="/matchup" class="nav-link">1v1 Matchup</a>
                    <a href="/matchup-advisor" class="nav-link active"
                        >Matchup Advisor</a
                    >
                </nav>
            </header>

            <div class="civ-selector">
                <div class="step-label step-civ1" id="step-label">
                    Click a civilization to select Civ 1
                </div>
                <div class="civ-grid" id="civ-grid"></div>
                <div class="selected-display" id="selected-display">
                    <span class="civ1-pick" id="pick-civ1">—</span>
                    <span class="vs-text">vs</span>
                    <span class="civ2-pick" id="pick-civ2">—</span>
                </div>
            </div>

            <button id="analyze-btn" class="compare-btn" disabled>
                Analyze Matchup
            </button>

            <div id="loading" class="loading" style="display: none">
                <div class="spinner"></div>
                <div>
                    Analyzing matchup... Running simulations across 4 phases
                </div>
            </div>

            <div id="results" class="results-container">
                <div class="matchup-header">
                    <h2>
                        <span class="civ1-name" id="result-civ1"></span>
                        <span style="color: #888"> vs </span>
                        <span class="civ2-name" id="result-civ2"></span>
                    </h2>
                </div>

                <div class="age-tab-bar" id="age-tabs"></div>
                <div id="age-contents"></div>
            </div>
        </div>

        <script>
            const CDN = "https://backend.cdn.aoe2companion.com/public/aoe2/de/civilizations/";
            const CIVS = {{ civs | tojson }};

            const analyzeBtn = document.getElementById("analyze-btn");
            const loadingEl = document.getElementById("loading");
            const resultsEl = document.getElementById("results");
            const stepLabel = document.getElementById("step-label");
            const pickCiv1 = document.getElementById("pick-civ1");
            const pickCiv2 = document.getElementById("pick-civ2");
            const civGrid = document.getElementById("civ-grid");

            let selectedCiv1 = null;
            let selectedCiv2 = null;
            let currentData = null;

            // Build civ grid
            CIVS.forEach(name => {
                const slug = name.toLowerCase();
                const card = document.createElement("div");
                card.className = "civ-card";
                card.dataset.civ = name;

                const img = document.createElement("img");
                img.className = "civ-emblem";
                img.src = CDN + slug + ".png";
                img.alt = name;
                img.loading = "lazy";

                const label = document.createElement("span");
                label.className = "civ-card-name";
                label.textContent = name;

                card.appendChild(img);
                card.appendChild(label);
                card.addEventListener("click", () => onCivClick(name));
                civGrid.appendChild(card);
            });

            function onCivClick(name) {
                if (!selectedCiv1) {
                    selectedCiv1 = name;
                    pickCiv1.textContent = name;
                    stepLabel.textContent = "Click a civilization to select Civ 2";
                    stepLabel.className = "step-label step-civ2";
                } else if (!selectedCiv2) {
                    if (name === selectedCiv1) return; // can't pick same
                    selectedCiv2 = name;
                    pickCiv2.textContent = name;
                    stepLabel.textContent = "Click a selected civ to deselect";
                    stepLabel.className = "step-label step-civ1";
                } else {
                    // Both selected — clicking a selected civ deselects it
                    if (name === selectedCiv1) {
                        selectedCiv1 = selectedCiv2;
                        selectedCiv2 = null;
                        pickCiv1.textContent = selectedCiv1;
                        pickCiv2.textContent = "—";
                        stepLabel.textContent = "Click a civilization to select Civ 2";
                        stepLabel.className = "step-label step-civ2";
                    } else if (name === selectedCiv2) {
                        selectedCiv2 = null;
                        pickCiv2.textContent = "—";
                        stepLabel.textContent = "Click a civilization to select Civ 2";
                        stepLabel.className = "step-label step-civ2";
                    }
                    // clicking an unselected civ when both are selected does nothing
                }
                updateGrid();
            }

            function updateGrid() {
                civGrid.querySelectorAll(".civ-card").forEach(card => {
                    const name = card.dataset.civ;
                    card.classList.remove("selected-civ1", "selected-civ2", "disabled");
                    if (name === selectedCiv1) {
                        card.classList.add("selected-civ1");
                    } else if (name === selectedCiv2) {
                        card.classList.add("selected-civ2");
                    } else if (selectedCiv1 && selectedCiv2) {
                        card.classList.add("disabled");
                    }
                });
                analyzeBtn.disabled = !selectedCiv1 || !selectedCiv2;
            }

            analyzeBtn.addEventListener("click", async () => {
                const c1 = selectedCiv1, c2 = selectedCiv2;
                if (!c1 || !c2 || c1 === c2) return;

                analyzeBtn.disabled = true;
                loadingEl.style.display = "block";
                resultsEl.classList.remove("visible");

                try {
                    const resp = await fetch(
                        `/api/matchup-advisor/${encodeURIComponent(c1)}/${encodeURIComponent(c2)}`,
                    );
                    if (!resp.ok) throw new Error(await resp.text());
                    currentData = await resp.json();
                    renderResults(currentData);
                } catch (e) {
                    alert("Error: " + e.message);
                } finally {
                    loadingEl.style.display = "none";
                    analyzeBtn.disabled = false;
                }
            });

            function slugToName(slug) {
                return slug
                    .replace(/_/g, " ")
                    .replace(/\b\w/g, (c) => c.toUpperCase());
            }

            function renderResults(data) {
                document.getElementById("result-civ1").textContent = data.civ1;
                document.getElementById("result-civ2").textContent = data.civ2;

                const tabBar = document.getElementById("age-tabs");
                const contents = document.getElementById("age-contents");
                tabBar.innerHTML = "";
                contents.innerHTML = "";

                const ages = Object.keys(data.ages);
                ages.forEach((ageKey, idx) => {
                    const age = data.ages[ageKey];

                    const tab = document.createElement("div");
                    tab.className = "age-tab" + (idx === 0 ? " active" : "");
                    tab.textContent = age.age_name;
                    tab.onclick = () => {
                        document
                            .querySelectorAll(".age-tab")
                            .forEach((t) => t.classList.remove("active"));
                        document
                            .querySelectorAll(".age-content")
                            .forEach((c) => c.classList.remove("active"));
                        tab.classList.add("active");
                        document
                            .getElementById("age-" + ageKey)
                            .classList.add("active");
                    };
                    tabBar.appendChild(tab);

                    const content = document.createElement("div");
                    content.id = "age-" + ageKey;
                    content.className =
                        "age-content" + (idx === 0 ? " active" : "");

                    if (age.error) {
                        content.innerHTML = `<div class="no-data">${age.error}</div>`;
                    } else {
                        content.innerHTML = renderAge(data, ageKey, age);
                    }
                    contents.appendChild(content);
                });

                resultsEl.classList.add("visible");
            }

            function renderAge(data, ageKey, age) {
                let html = "";

                // Phase 1: Mobile Dominance
                const p1 = age.phase1_mobile;
                html += `<div class="phase-card">
                    <h3><span class="phase-num">1</span> Mobile Dominance</h3>`;

                if (!p1.civ1_units.length && !p1.civ2_units.length) {
                    html += `<div class="no-data">Neither civilization has mobile units (speed > 1.4)</div>`;
                } else {
                    if (p1.dominant_civ && p1.dominant_unit) {
                        const civName =
                            p1.dominant_civ === "civ1" ? data.civ1 : data.civ2;
                        const civClass = p1.dominant_civ;
                        html += `<div class="callout ${civClass}">
                            <strong>${civName}</strong> dominates mobile with <strong>${p1.dominant_unit.name}</strong>
                        </div>`;
                    }

                    if (p1.civ1_units.length && p1.civ2_units.length) {
                        // Unit lists
                        html += `<div style="display:flex;gap:20px;margin-top:12px;flex-wrap:wrap">`;
                        html += `<div><strong style="color:#ff6b6b">${data.civ1} Mobile</strong><ul style="list-style:none;margin-top:6px">`;
                        for (const u of p1.civ1_units) {
                            html += `<li style="padding:2px 0;font-size:0.9rem">${u.name} <span style="color:#888">(${u.speed.toFixed(2)})</span> <span style="color:#ffd700">${u.total_score}pts</span></li>`;
                        }
                        html += `</ul></div>`;
                        html += `<div><strong style="color:#4ecdc4">${data.civ2} Mobile</strong><ul style="list-style:none;margin-top:6px">`;
                        for (const u of p1.civ2_units) {
                            html += `<li style="padding:2px 0;font-size:0.9rem">${u.name} <span style="color:#888">(${u.speed.toFixed(2)})</span> <span style="color:#ffd700">${u.total_score}pts</span></li>`;
                        }
                        html += `</ul></div></div>`;

                        // Grid
                        if (p1.grid.length) {
                            html += renderGrid(
                                p1.grid,
                                p1.civ1_units,
                                p1.civ2_units,
                                data,
                            );
                        }
                    } else {
                        const hasMobile = p1.civ1_units.length
                            ? data.civ1
                            : data.civ2;
                        const noMobile = p1.civ1_units.length
                            ? data.civ2
                            : data.civ1;
                        html += `<div class="callout neutral">${noMobile} has no mobile units (speed > 1.4). ${hasMobile} wins mobile by default.</div>`;
                    }
                }
                html += `</div>`;

                // Phase 2: Ranged Advantage
                const p2 = age.phase2_ranged;
                html += `<div class="phase-card">
                    <h3><span class="phase-num">2</span> Ranged Advantage</h3>`;

                const weakerName =
                    p2.analyzed_for === "civ1" ? data.civ1 : data.civ2;
                const weakerClass = p2.analyzed_for;
                if (p2.advantage_unit) {
                    const clearText = p2.has_clear_advantage
                        ? "clear ranged advantage"
                        : "best ranged option";
                    html += `<div class="callout ${weakerClass}">
                        <strong>${weakerName}</strong> ${clearText}: <strong>${p2.advantage_unit.name}</strong>
                    </div>`;
                } else {
                    html += `<div class="no-data">No ranged gold units to compare</div>`;
                }

                if (p2.grid.length) {
                    html += renderPhase2Grid(p2.grid, data, p2.analyzed_for);
                }
                html += `</div>`;

                // Phase 3: Recommended Combos
                const p3 = age.phase3_combos;
                html += `<div class="phase-card">
                    <h3><span class="phase-num">3</span> Recommended Army Combos</h3>
                    <p style="color:#888;font-size:0.9rem;margin-bottom:12px">Select your preferred combo for each civ, or choose a custom pair.</p>
                    <div class="combo-section">`;

                html += renderComboBox(
                    p3.civ1,
                    data.civ1,
                    "civ1",
                    ageKey,
                    data,
                );
                html += renderComboBox(
                    p3.civ2,
                    data.civ2,
                    "civ2",
                    ageKey,
                    data,
                );
                html += `</div></div>`;

                // Phase 4: Army Simulation
                const p4 = age.phase4_army;
                html += `<div class="phase-card">
                    <h3><span class="phase-num">4</span> Army Simulation (5000 resources)</h3>`;

                if (p4.combo_grid.length) {
                    html += `<div class="army-results">`;
                    // Show recommended vs recommended first
                    const recVsRec = p4.combo_grid.find(
                        (g) => g.civ1_combo_id === 0 && g.civ2_combo_id === 0,
                    );
                    if (recVsRec) {
                        html += renderArmyResult(recVsRec, p3, data, true);
                    }
                    // Show other notable results
                    for (const g of p4.combo_grid) {
                        if (g.civ1_combo_id === 0 && g.civ2_combo_id === 0)
                            continue;
                        html += renderArmyResult(g, p3, data, false);
                    }
                    html += `</div>`;
                } else {
                    html += `<div class="no-data">No army simulations available</div>`;
                }
                html += `</div>`;

                return html;
            }

            function renderGrid(grid, civ1Units, civ2Units, data) {
                const c1Slugs = [...new Set(grid.map((g) => g.my_slug))];
                const c2Slugs = [...new Set(grid.map((g) => g.opp_slug))];
                const c1Names = {};
                const c2Names = {};
                for (const u of civ1Units) c1Names[u.slug] = u.name;
                for (const u of civ2Units) c2Names[u.slug] = u.name;

                const cols = c2Slugs.length + 1;
                let html = `<div class="mobile-grid" style="grid-template-columns: auto repeat(${c2Slugs.length}, 1fr); margin-top:12px">`;
                html += `<div class="grid-cell header"></div>`;
                for (const s of c2Slugs) {
                    html += `<div class="grid-cell header" style="color:#8ee8e2">${c2Names[s] || slugToName(s)}</div>`;
                }
                for (const c1s of c1Slugs) {
                    html += `<div class="grid-cell header" style="color:#ff9999">${c1Names[c1s] || slugToName(c1s)}</div>`;
                    for (const c2s of c2Slugs) {
                        const m = grid.find(
                            (g) => g.my_slug === c1s && g.opp_slug === c2s,
                        );
                        if (m) {
                            const cls =
                                m.winner === 1
                                    ? "win"
                                    : m.winner === 2
                                      ? "loss"
                                      : "draw";
                            const label =
                                m.winner === 1
                                    ? "W"
                                    : m.winner === 2
                                      ? "L"
                                      : "D";
                            html += `<div class="grid-cell ${cls}" title="${c1Names[c1s]} vs ${c2Names[c2s]}: ${m.s1}-${m.s2}">${label} ${m.s1}-${m.s2}</div>`;
                        } else {
                            html += `<div class="grid-cell">-</div>`;
                        }
                    }
                }
                html += `</div>`;
                return html;
            }

            function renderPhase2Grid(grid, data, analyzedFor) {
                const mySlugs = [...new Set(grid.map((g) => g.my_slug))];
                const oppSlugs = [...new Set(grid.map((g) => g.opp_slug))];
                if (!mySlugs.length || !oppSlugs.length) return "";

                const myColor = analyzedFor === "civ1" ? "#ff9999" : "#8ee8e2";
                const oppColor = analyzedFor === "civ1" ? "#8ee8e2" : "#ff9999";

                let html = `<div class="mobile-grid" style="grid-template-columns: auto repeat(${oppSlugs.length}, 1fr); margin-top:12px">`;
                html += `<div class="grid-cell header"></div>`;
                for (const s of oppSlugs)
                    html += `<div class="grid-cell header" style="color:${oppColor}">${slugToName(s)}</div>`;
                for (const ms of mySlugs) {
                    html += `<div class="grid-cell header" style="color:${myColor}">${slugToName(ms)}</div>`;
                    for (const os of oppSlugs) {
                        const m = grid.find(
                            (g) => g.my_slug === ms && g.opp_slug === os,
                        );
                        if (m) {
                            const cls =
                                m.winner === 1
                                    ? "win"
                                    : m.winner === 2
                                      ? "loss"
                                      : "draw";
                            const label =
                                m.winner === 1
                                    ? "W"
                                    : m.winner === 2
                                      ? "L"
                                      : "D";
                            html += `<div class="grid-cell ${cls}">${label} ${m.s1}-${m.s2}</div>`;
                        } else {
                            html += `<div class="grid-cell">-</div>`;
                        }
                    }
                }
                html += `</div>`;
                return html;
            }

            function renderComboBox(combos, civName, civKey, ageKey, data) {
                const boxClass = civKey === "civ1" ? "civ1-box" : "civ2-box";
                const radioName = `combo-${civKey}-${ageKey}`;
                const allUnits = data.all_units[civKey].filter(
                    (u) => u.age === ageKey,
                );

                let html = `<div class="combo-box ${boxClass}">
                    <h4>${civName}</h4>`;

                if (!combos.length) {
                    html += `<div class="no-data">No combos generated</div>`;
                } else {
                    for (const c of combos) {
                        const recClass = c.is_recommended ? " recommended" : "";
                        const scoreLabel =
                            c.army_score !== 0 ? c.army_score.toFixed(2) : "--";
                        html += `<label class="combo-option${recClass}">
                            <input type="radio" name="${radioName}" value="${c.id}" ${c.is_recommended ? "checked" : ""}>
                            <div class="combo-label">
                                <div class="combo-units">${c.primary.name} + ${c.secondary.name}</div>
                                <div class="combo-reasoning">${c.reasoning}${c.is_recommended ? " (Recommended)" : ""}</div>
                            </div>
                            <span class="combo-score">${scoreLabel}</span>
                        </label>`;
                    }
                }

                // Custom option
                html += `<label class="combo-option">
                    <input type="radio" name="${radioName}" value="custom">
                    <div class="combo-label">
                        <div class="combo-units">Custom combo</div>
                    </div>
                </label>
                <div class="custom-combo" id="custom-${civKey}-${ageKey}" style="display:none">
                    <select id="custom1-${civKey}-${ageKey}">
                        <option value="">Unit 1...</option>
                        ${allUnits.map((u) => `<option value="${u.slug}">${u.name}</option>`).join("")}
                    </select>
                    <span class="plus">+</span>
                    <select id="custom2-${civKey}-${ageKey}">
                        <option value="">Unit 2...</option>
                        ${allUnits.map((u) => `<option value="${u.slug}">${u.name}</option>`).join("")}
                    </select>
                </div>`;

                html += `<button class="submit-btn" id="submit-${civKey}-${ageKey}" onclick="submitVote('${civKey}','${ageKey}')">Submit Choice</button>`;
                html += `</div>`;

                // Wire up custom radio toggle after render
                setTimeout(() => {
                    const radios = document.querySelectorAll(
                        `input[name="${radioName}"]`,
                    );
                    const customDiv = document.getElementById(
                        `custom-${civKey}-${ageKey}`,
                    );
                    if (customDiv) {
                        radios.forEach((r) => {
                            r.addEventListener("change", () => {
                                customDiv.style.display =
                                    r.value === "custom" && r.checked
                                        ? "flex"
                                        : "none";
                            });
                        });
                    }
                }, 0);

                return html;
            }

            function renderArmyResult(g, p3, data, isHighlighted) {
                const c1combo = p3.civ1[g.civ1_combo_id];
                const c2combo = p3.civ2[g.civ2_combo_id];
                if (!c1combo || !c2combo) return "";

                const bgStyle = isHighlighted
                    ? "background:rgba(255,215,0,0.08);border:1px solid rgba(255,215,0,0.15)"
                    : "";
                const winnerClass =
                    g.winner === "civ1"
                        ? "civ1-win"
                        : g.winner === "civ2"
                          ? "civ2-win"
                          : "draw-result";
                const winnerLabel =
                    g.winner === "civ1"
                        ? data.civ1
                        : g.winner === "civ2"
                          ? data.civ2
                          : "Draw";

                return `<div class="army-result-row" style="${bgStyle}">
                    <div class="combo-desc">
                        <span class="c1">${c1combo.primary.name} + ${c1combo.secondary.name}</span>
                        <span style="color:#666"> vs </span>
                        <span class="c2">${c2combo.primary.name} + ${c2combo.secondary.name}</span>
                        <span style="color:#555;font-size:0.8rem"> (${g.counts_civ1[0]}+${g.counts_civ1[1]} vs ${g.counts_civ2[0]}+${g.counts_civ2[1]})</span>
                    </div>
                    <span class="army-winner ${winnerClass}">${winnerLabel}</span>
                </div>`;
            }

            async function submitVote(civKey, ageKey) {
                const btn = document.getElementById(
                    `submit-${civKey}-${ageKey}`,
                );
                if (btn.disabled) return;

                const radioName = `combo-${civKey}-${ageKey}`;
                const selected = document.querySelector(
                    `input[name="${radioName}"]:checked`,
                );
                if (!selected) return;

                let selType = "preset";
                let comboId = parseInt(selected.value);
                let primary = "",
                    secondary = "";

                if (selected.value === "custom") {
                    selType = "custom";
                    comboId = null;
                    primary = document.getElementById(
                        `custom1-${civKey}-${ageKey}`,
                    ).value;
                    secondary = document.getElementById(
                        `custom2-${civKey}-${ageKey}`,
                    ).value;
                    if (!primary || !secondary) {
                        alert("Please select both units for custom combo");
                        return;
                    }
                } else {
                    const age = currentData.ages[ageKey];
                    const combos = age.phase3_combos[civKey];
                    const combo = combos[comboId];
                    if (combo) {
                        primary = combo.primary.slug;
                        secondary = combo.secondary.slug;
                    }
                }

                // Get recommended combo info
                const age = currentData.ages[ageKey];
                const combos = age.phase3_combos[civKey];
                const recommended = combos.find((c) => c.is_recommended);

                const vote = {
                    civ1: currentData.civ1,
                    civ2: currentData.civ2,
                    age: ageKey,
                    selected_for: civKey,
                    selection_type: selType,
                    combo_id: comboId,
                    combo_primary: primary,
                    combo_secondary: secondary,
                    recommended_combo_id: recommended ? recommended.id : null,
                    recommended_primary: recommended
                        ? recommended.primary.slug
                        : null,
                    recommended_secondary: recommended
                        ? recommended.secondary.slug
                        : null,
                };

                try {
                    const resp = await fetch("/api/matchup-advisor/vote", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(vote),
                    });
                    if (resp.ok) {
                        btn.textContent = "Choice recorded";
                        btn.classList.add("submitted");
                        btn.disabled = true;
                    }
                } catch (e) {
                    console.error("Vote failed:", e);
                }
            }
        </script>
    </body>
</html>
