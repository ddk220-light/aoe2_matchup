<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Civ Matchup - AoE2 Unit Analyzer</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Oxygen, Ubuntu, sans-serif;
                background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
                color: #e4e4e4;
                min-height: 100vh;
                padding: 20px;
            }

            .container {
                max-width: 1400px;
                margin: 0 auto;
            }

            header {
                text-align: center;
                margin-bottom: 30px;
            }

            h1 {
                font-size: 2.5rem;
                background: linear-gradient(90deg, #ffd700, #ff8c00);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                margin-bottom: 10px;
            }

            .subtitle {
                color: #888;
                font-size: 1.1rem;
            }

            .nav-links {
                display: flex;
                justify-content: center;
                gap: 20px;
                margin-top: 20px;
                flex-wrap: wrap;
            }
            .nav-link {
                color: #888;
                text-decoration: none;
                padding: 8px 16px;
                border-radius: 20px;
                transition: all 0.3s;
            }
            .nav-link:hover {
                color: #ffd700;
                background: rgba(255, 215, 0, 0.1);
            }
            .nav-link.active {
                color: #ffd700;
                background: rgba(255, 215, 0, 0.2);
            }

            /* --- Civ Selector --- */
            .civ-selector {
                text-align: center;
                margin-bottom: 20px;
            }
            .civ-selector h3 {
                margin-bottom: 12px;
                font-size: 1.1rem;
            }
            .step-label {
                display: inline-block;
                padding: 4px 14px;
                border-radius: 12px;
                font-size: 0.85rem;
                margin-bottom: 10px;
            }
            .step-civ1 {
                background: rgba(255, 107, 107, 0.15);
                color: #ff6b6b;
            }
            .step-civ2 {
                background: rgba(78, 205, 196, 0.15);
                color: #4ecdc4;
            }

            .civ-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
                gap: 10px;
                max-width: 900px;
                margin: 0 auto;
            }
            .civ-card {
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 10px 6px 8px;
                background: rgba(255, 255, 255, 0.05);
                border: 2px solid rgba(255, 255, 255, 0.1);
                border-radius: 8px;
                cursor: pointer;
                transition: all 0.25s ease;
                color: #e4e4e4;
            }
            .civ-card:hover {
                transform: translateY(-2px);
                border-color: rgba(255, 215, 0, 0.3);
                box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            }
            .civ-card.selected-civ1 {
                border-color: #ff6b6b;
                background: rgba(255, 107, 107, 0.15);
                box-shadow: 0 0 12px rgba(255, 107, 107, 0.3);
            }
            .civ-card.selected-civ2 {
                border-color: #4ecdc4;
                background: rgba(78, 205, 196, 0.15);
                box-shadow: 0 0 12px rgba(78, 205, 196, 0.3);
            }
            .civ-card.disabled {
                opacity: 0.35;
                pointer-events: none;
            }
            .civ-emblem {
                width: 44px;
                height: 44px;
                border-radius: 50%;
                border: 2px solid rgba(255, 215, 0, 0.4);
                object-fit: cover;
                background: rgba(0, 0, 0, 0.3);
                margin-bottom: 5px;
            }
            .civ-card-name {
                font-size: 0.75rem;
                text-align: center;
                line-height: 1.2;
            }

            .selected-display {
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 20px;
                margin: 15px 0;
                font-size: 1.1rem;
                min-height: 40px;
            }
            .selected-display .civ1-pick {
                color: #ff6b6b;
                font-weight: 600;
            }
            .selected-display .civ2-pick {
                color: #4ecdc4;
                font-weight: 600;
            }
            .selected-display .vs-text {
                color: #666;
            }

            .compare-btn {
                display: block;
                margin: 10px auto 20px;
                padding: 15px 40px;
                background: linear-gradient(90deg, #ffd700, #ff8c00);
                border: none;
                border-radius: 25px;
                color: #1a1a2e;
                font-size: 1.1rem;
                font-weight: bold;
                cursor: pointer;
                transition:
                    transform 0.2s,
                    box-shadow 0.2s;
            }
            .compare-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
            }
            .compare-btn:disabled {
                opacity: 0.5;
                cursor: not-allowed;
                transform: none;
            }

            @media (max-width: 600px) {
                .civ-grid {
                    grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
                    gap: 8px;
                }
                .civ-emblem {
                    width: 36px;
                    height: 36px;
                }
                .civ-card-name {
                    font-size: 0.7rem;
                }
            }

            /* --- Results --- */
            .results-container {
                display: none;
            }
            .results-container.visible {
                display: block;
            }

            .matchup-header {
                text-align: center;
                margin-bottom: 30px;
                padding: 20px;
                background: rgba(255, 255, 255, 0.05);
                border-radius: 12px;
            }
            .matchup-header h2 {
                font-size: 1.8rem;
                margin-bottom: 10px;
            }
            .civ1-color {
                color: #ff6b6b;
            }
            .civ2-color {
                color: #4ecdc4;
            }

            .age-tab-bar {
                display: flex;
                justify-content: center;
                gap: 10px;
                margin-bottom: 25px;
            }
            .age-tab {
                padding: 10px 24px;
                border-radius: 20px;
                cursor: pointer;
                background: rgba(255, 255, 255, 0.05);
                color: #888;
                border: 1px solid transparent;
                transition: all 0.3s;
                font-size: 1rem;
            }
            .age-tab:hover {
                color: #ffd700;
                background: rgba(255, 215, 0, 0.1);
            }
            .age-tab.active {
                color: #ffd700;
                background: rgba(255, 215, 0, 0.15);
                border-color: rgba(255, 215, 0, 0.3);
            }
            .age-content {
                display: none;
            }
            .age-content.active {
                display: block;
            }

            /* --- 3-Column Analysis --- */
            .analysis-columns {
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                gap: 20px;
                margin-bottom: 24px;
            }
            @media (max-width: 768px) {
                .analysis-columns {
                    grid-template-columns: 1fr;
                }
            }

            .analysis-col {
                background: rgba(255, 255, 255, 0.05);
                border-radius: 12px;
                padding: 20px;
                text-align: center;
                min-height: 180px;
            }
            .analysis-col .col-header {
                font-size: 0.8rem;
                text-transform: uppercase;
                letter-spacing: 1px;
                color: #ffd700;
                margin-bottom: 14px;
                font-weight: 600;
            }
            .analysis-col .col-civ {
                font-size: 1.1rem;
                font-weight: 600;
                margin-bottom: 10px;
            }
            .analysis-col .col-detail {
                font-size: 0.85rem;
                color: #999;
                margin-top: 8px;
                line-height: 1.4;
            }
            .analysis-col .no-unit {
                color: #666;
                font-style: italic;
                margin-top: 20px;
            }

            /* --- Unit badge --- */
            .unit-badge {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                margin: 6px 0;
            }
            .unit-icon {
                width: 48px;
                height: 48px;
                border-radius: 6px;
                border: 2px solid rgba(255, 215, 0, 0.3);
                background: rgba(0, 0, 0, 0.3);
                object-fit: cover;
            }
            .unit-icon.sm {
                width: 28px;
                height: 28px;
                border-radius: 4px;
                border-width: 1px;
            }
            .unit-name {
                font-weight: 500;
                font-size: 1rem;
            }
            .unit-name.sm {
                font-size: 0.85rem;
            }

            /* --- Combo Section --- */
            .combo-section-header {
                font-size: 1.2rem;
                color: #ffd700;
                margin-bottom: 16px;
                text-align: center;
                font-weight: 600;
            }
            .combo-cards {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 16px;
                margin-bottom: 16px;
            }
            @media (max-width: 768px) {
                .combo-cards {
                    grid-template-columns: 1fr;
                }
            }

            .combo-card {
                display: flex;
                align-items: center;
                gap: 16px;
                padding: 16px;
                border-radius: 10px;
                background: rgba(0, 0, 0, 0.2);
            }
            .combo-card.civ1-card {
                border-left: 4px solid #ff6b6b;
            }
            .combo-card.civ2-card {
                border-left: 4px solid #4ecdc4;
            }
            .combo-card .combo-civ-name {
                font-size: 0.85rem;
                font-weight: 600;
                margin-bottom: 6px;
            }
            .combo-card .combo-units-row {
                display: flex;
                align-items: center;
                gap: 10px;
                flex-wrap: wrap;
            }
            .combo-card .combo-plus {
                color: #666;
                font-size: 1.2rem;
                font-weight: bold;
            }
            .combo-card .combo-reasoning {
                font-size: 0.8rem;
                color: #888;
                margin-top: 6px;
            }

            .alt-combos-section {
                margin-top: 8px;
            }
            .alt-combos-header {
                font-size: 0.9rem;
                color: #888;
                margin-bottom: 8px;
                text-align: center;
            }
            .alt-combos-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }
            @media (max-width: 768px) {
                .alt-combos-grid {
                    grid-template-columns: 1fr;
                }
            }

            .alt-combo-row {
                display: flex;
                align-items: center;
                gap: 6px;
                padding: 6px 10px;
                border-radius: 6px;
                background: rgba(255, 255, 255, 0.03);
                font-size: 0.85rem;
            }
            .alt-combo-row.civ1-alt {
                border-left: 2px solid rgba(255, 107, 107, 0.4);
            }
            .alt-combo-row.civ2-alt {
                border-left: 2px solid rgba(78, 205, 196, 0.4);
            }
            .alt-combo-row .alt-label {
                color: #666;
                font-size: 0.75rem;
                margin-right: 4px;
            }

            /* --- Army Section --- */
            .army-section {
                background: rgba(255, 255, 255, 0.05);
                border-radius: 12px;
                padding: 20px;
                margin-top: 24px;
            }
            .army-section-header {
                font-size: 1.2rem;
                color: #ffd700;
                margin-bottom: 16px;
                font-weight: 600;
            }
            .army-explanation {
                background: rgba(255, 215, 0, 0.06);
                border: 1px solid rgba(255, 215, 0, 0.15);
                border-radius: 8px;
                padding: 14px;
                font-size: 0.85rem;
                color: #bbb;
                margin-bottom: 20px;
                line-height: 1.5;
            }
            .army-best-results {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 16px;
                margin-bottom: 20px;
            }
            @media (max-width: 768px) {
                .army-best-results {
                    grid-template-columns: 1fr;
                }
            }

            .army-best-card {
                padding: 16px;
                border-radius: 10px;
                background: rgba(0, 0, 0, 0.2);
            }
            .army-best-card.civ1-card {
                border-left: 4px solid #ff6b6b;
            }
            .army-best-card.civ2-card {
                border-left: 4px solid #4ecdc4;
            }
            .army-best-card .best-civ-name {
                font-weight: 600;
                margin-bottom: 8px;
            }
            .army-best-card .best-combo-detail {
                display: flex;
                align-items: center;
                gap: 6px;
                flex-wrap: wrap;
                margin-bottom: 6px;
            }
            .army-best-card .best-record {
                font-size: 0.85rem;
                color: #aaa;
                margin-bottom: 4px;
            }
            .army-best-card .best-split {
                font-size: 0.8rem;
                color: #888;
            }
            .army-best-card .best-countered {
                font-size: 0.8rem;
                color: #e88;
                margin-top: 8px;
                padding-top: 8px;
                border-top: 1px solid rgba(255, 255, 255, 0.06);
            }

            .army-grid-toggle {
                display: block;
                width: 100%;
                padding: 8px;
                text-align: center;
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 6px;
                color: #888;
                cursor: pointer;
                font-size: 0.85rem;
                transition: all 0.2s;
            }
            .army-grid-toggle:hover {
                color: #ffd700;
                border-color: rgba(255, 215, 0, 0.3);
            }

            .army-full-grid {
                margin-top: 12px;
            }
            .army-result-row {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 8px 12px;
                border-radius: 6px;
                margin-bottom: 4px;
                background: rgba(0, 0, 0, 0.15);
                font-size: 0.85rem;
            }
            .army-result-row .combo-desc {
                flex: 1;
            }
            .army-winner {
                font-size: 0.8rem;
                font-weight: 600;
                padding: 3px 10px;
                border-radius: 12px;
            }
            .army-winner.civ1-win {
                background: rgba(255, 107, 107, 0.2);
                color: #ff9999;
            }
            .army-winner.civ2-win {
                background: rgba(78, 205, 196, 0.2);
                color: #8ee8e2;
            }
            .army-winner.draw-result {
                background: rgba(158, 158, 158, 0.2);
                color: #bdbdbd;
            }

            /* --- Skeleton / Loading --- */
            .skeleton-block {
                background: rgba(255, 255, 255, 0.05);
                border-radius: 8px;
                height: 20px;
                margin: 8px 0;
                animation: pulse 1.5s ease-in-out infinite;
            }
            .skeleton-block.tall {
                height: 120px;
            }
            .skeleton-block.med {
                height: 60px;
            }
            @keyframes pulse {
                0%,
                100% {
                    opacity: 0.3;
                }
                50% {
                    opacity: 0.7;
                }
            }

            .loading-spinner {
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 30px;
                color: #888;
            }
            .loading-spinner .spinner {
                width: 32px;
                height: 32px;
                border: 3px solid rgba(255, 215, 0, 0.2);
                border-top-color: #ffd700;
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
                margin-bottom: 10px;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            .no-data {
                color: #666;
                font-style: italic;
                padding: 20px;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <header>
                <h1>Civ Matchup</h1>
                <p class="subtitle">
                    Strategic army composition analysis for any civ matchup
                </p>
                <nav class="nav-links">
                    <a href="/" class="nav-link">Home</a>
                    <a href="/matchup-advisor" class="nav-link active"
                        >Civ Matchup</a
                    >
                </nav>
            </header>

            <div class="civ-selector">
                <div class="step-label step-civ1" id="step-label">
                    Click a civilization to select Civ 1
                </div>
                <div class="civ-grid" id="civ-grid"></div>
                <div class="selected-display" id="selected-display">
                    <span class="civ1-pick" id="pick-civ1">&mdash;</span>
                    <span class="vs-text">vs</span>
                    <span class="civ2-pick" id="pick-civ2">&mdash;</span>
                </div>
            </div>

            <button id="analyze-btn" class="compare-btn" disabled>
                Analyze Matchup
            </button>

            <div id="results" class="results-container"></div>
        </div>

        <script>
            /* ---- Icon system ---- */
            const ICON_BASE = "https://aoe2techtree.net/img/Units/";
            const ICON_BASE_FALLBACK = "https://raw.githubusercontent.com/qwyt/aoe2-icon-resources/master/objects/";
            const NAME_TO_ICON = {
                "Spearman":93,"Pikeman":358,"Halberdier":359,
                "Man-at-Arms":75,"Long Swordsman":77,"Two-Handed Swordsman":473,"Champion":567,
                "Eagle Scout":751,"Eagle Warrior":753,"Elite Eagle Warrior":752,
                "Archer":4,"Crossbowman":24,"Arbalester":492,
                "Skirmisher":7,"Elite Skirmisher":6,
                "Cavalry Archer":39,"Heavy Cavalry Archer":474,"Hand Cannoneer":5,
                "Scout Cavalry":448,"Light Cavalry":546,"Hussar":441,"Winged Hussar":1707,
                "Knight":38,"Cavalier":283,"Paladin":569,"Savar":569,
                "Camel Rider":329,"Heavy Camel Rider":330,
                "Steppe Lancer":1370,"Elite Steppe Lancer":1372,
                "Battering Ram":1258,"Capped Ram":422,"Siege Ram":548,
                "Mangonel":280,"Onager":550,"Siege Onager":588,
                "Rocket Cart":1904,"Heavy Rocket Cart":1907,
                "Scorpion":279,"Heavy Scorpion":542,"Bombard Cannon":36,"Trebuchet":331,
                "Longbowman":8,"Elite Longbowman":8,
                "Cataphract":40,"Elite Cataphract":40,
                "Woad Raider":232,"Elite Woad Raider":232,
                "Chu Ko Nu":73,"Elite Chu Ko Nu":73,
                "Throwing Axeman":281,"Elite Throwing Axeman":281,
                "Huskarl":41,"Elite Huskarl":41,
                "Samurai":291,"Elite Samurai":291,
                "Mangudai":11,"Elite Mangudai":11,
                "Battle Elephant":1132,"Elite Battle Elephant":1134,
                "War Elephant":239,"Elite War Elephant":239,
                "Mameluke":282,"Elite Mameluke":282,
                "Teutonic Knight":25,"Elite Teutonic Knight":25,
                "Janissary":46,"Elite Janissary":46,
                "Berserk":692,"Elite Berserk":692,
                "Fire Lancer":1901,"Elite Fire Lancer":1903,
                "Jaguar Warrior":725,"Elite Jaguar Warrior":726,
                "Plumed Archer":763,"Elite Plumed Archer":765,
                "Tarkan":755,"Elite Tarkan":757,
                "War Wagon":827,"Elite War Wagon":829,
                "Conquistador":771,"Elite Conquistador":773,
                "Kamayuk":879,"Elite Kamayuk":879,
                "Genoese Crossbowman":866,"Elite Genoese Crossbowman":866,
                "Magyar Huszar":869,"Elite Magyar Huszar":869,
                "Boyar":876,"Elite Boyar":876,
                "Condottiero":882,"Slinger":185,
                "Imperial Skirmisher":1155,
                "Genitour":1010,"Elite Genitour":1012,
                "Camel Archer":1007,"Elite Camel Archer":1009,
                "Shotel Warrior":1016,"Elite Shotel Warrior":1018,
                "Gbeto":1013,"Elite Gbeto":1015,
                "Organ Gun":1001,"Elite Organ Gun":1003,
                "Arambai":1126,"Elite Arambai":1128,
                "Ballista Elephant":1120,"Elite Ballista Elephant":1122,
                "Karambit Warrior":1123,"Elite Karambit Warrior":1125,
                "Rattan Archer":1129,"Elite Rattan Archer":1131,
                "Konnik":1225,"Elite Konnik":1227,
                "Keshik":1228,"Elite Keshik":1230,
                "Kipchak":1231,"Elite Kipchak":1233,
                "Leitis":1234,"Elite Leitis":1236,
                "Coustillier":1655,"Elite Coustillier":1657,
                "Serjeant":1658,"Elite Serjeant":1659,
                "Flemish Militia":1699,
                "Obuch":1701,"Elite Obuch":1703,
                "Hussite Wagon":1704,"Elite Hussite Wagon":1706,
            };
            function iconUrl(id) { return ICON_BASE + id + ".png"; }
            function unitIconUrl(name) { const id = NAME_TO_ICON[name]; return id ? iconUrl(id) : ""; }

            function unitBadge(name, size) {
                size = size || "normal";
                const url = unitIconUrl(name);
                const cls = size === "sm" ? "sm" : "";
                const px = size === "sm" ? 28 : 48;
                const img = url
                    ? `<img src="${url}" class="unit-icon ${cls}" width="${px}" height="${px}" alt="${name}" onerror="this.style.display='none'">`
                    : '';
                return `<span class="unit-badge">${img}<span class="unit-name ${cls}">${name}</span></span>`;
            }

            /* ---- Civ selector ---- */
            const CDN = "https://backend.cdn.aoe2companion.com/public/aoe2/de/civilizations/";
            const CIVS = {{ civs | tojson }};
            const analyzeBtn = document.getElementById("analyze-btn");
            const stepLabel = document.getElementById("step-label");
            const pickCiv1 = document.getElementById("pick-civ1");
            const pickCiv2 = document.getElementById("pick-civ2");
            const civGrid = document.getElementById("civ-grid");
            const resultsEl = document.getElementById("results");

            let selectedCiv1 = null, selectedCiv2 = null;

            CIVS.forEach(name => {
                const slug = name.toLowerCase();
                const card = document.createElement("div");
                card.className = "civ-card";
                card.dataset.civ = name;
                const img = document.createElement("img");
                img.className = "civ-emblem"; img.src = CDN + slug + ".png"; img.alt = name; img.loading = "lazy";
                const label = document.createElement("span");
                label.className = "civ-card-name"; label.textContent = name;
                card.appendChild(img); card.appendChild(label);
                card.addEventListener("click", () => onCivClick(name));
                civGrid.appendChild(card);
            });

            function onCivClick(name) {
                if (!selectedCiv1) {
                    selectedCiv1 = name; pickCiv1.textContent = name;
                    stepLabel.textContent = "Click a civilization to select Civ 2";
                    stepLabel.className = "step-label step-civ2";
                } else if (!selectedCiv2) {
                    if (name === selectedCiv1) return;
                    selectedCiv2 = name; pickCiv2.textContent = name;
                    stepLabel.textContent = "Click a selected civ to deselect";
                    stepLabel.className = "step-label step-civ1";
                } else {
                    if (name === selectedCiv1) {
                        selectedCiv1 = selectedCiv2; selectedCiv2 = null;
                        pickCiv1.textContent = selectedCiv1; pickCiv2.textContent = "\u2014";
                        stepLabel.textContent = "Click a civilization to select Civ 2";
                        stepLabel.className = "step-label step-civ2";
                    } else if (name === selectedCiv2) {
                        selectedCiv2 = null; pickCiv2.textContent = "\u2014";
                        stepLabel.textContent = "Click a civilization to select Civ 2";
                        stepLabel.className = "step-label step-civ2";
                    }
                }
                updateGrid();
            }

            function updateGrid() {
                civGrid.querySelectorAll(".civ-card").forEach(card => {
                    const name = card.dataset.civ;
                    card.classList.remove("selected-civ1", "selected-civ2", "disabled");
                    if (name === selectedCiv1) card.classList.add("selected-civ1");
                    else if (name === selectedCiv2) card.classList.add("selected-civ2");
                    else if (selectedCiv1 && selectedCiv2) card.classList.add("disabled");
                });
                analyzeBtn.disabled = !selectedCiv1 || !selectedCiv2;
            }

            /* ---- Analysis flow ---- */
            analyzeBtn.addEventListener("click", async () => {
                const c1 = selectedCiv1, c2 = selectedCiv2;
                if (!c1 || !c2 || c1 === c2) return;
                analyzeBtn.disabled = true;

                // Show skeleton immediately
                showSkeleton(c1, c2);

                try {
                    // Fast call: phases 1-3
                    const analysis = await fetch(
                        `/api/matchup-advisor/analysis/${encodeURIComponent(c1)}/${encodeURIComponent(c2)}`
                    ).then(r => { if (!r.ok) throw new Error("Analysis failed"); return r.json(); });

                    renderAnalysis(analysis);

                    // Slow call: phase 4 army (don't block)
                    fetch(`/api/matchup-advisor/army/${encodeURIComponent(c1)}/${encodeURIComponent(c2)}`)
                        .then(r => r.json())
                        .then(army => renderArmy(army, analysis))
                        .catch(e => {
                            document.querySelectorAll(".army-loading").forEach(el => {
                                el.innerHTML = `<div class="no-data">Army simulation failed: ${e.message}</div>`;
                            });
                        });
                } catch (e) {
                    resultsEl.innerHTML = `<div class="no-data">Error: ${e.message}</div>`;
                } finally {
                    analyzeBtn.disabled = false;
                }
            });

            /* ---- Skeleton ---- */
            function showSkeleton(c1, c2) {
                resultsEl.className = "results-container visible";
                resultsEl.innerHTML = `
                    <div class="matchup-header">
                        <h2><span class="civ1-color">${c1}</span> <span style="color:#888">vs</span> <span class="civ2-color">${c2}</span></h2>
                    </div>
                    <div class="loading-spinner">
                        <div class="spinner"></div>
                        <div>Running strategic analysis...</div>
                    </div>`;
            }

            /* ---- Render phases 1-3 ---- */
            function renderAnalysis(data) {
                const ages = Object.keys(data.ages);
                let tabsHtml = '';
                let contentsHtml = '';

                ages.forEach((ageKey, idx) => {
                    const age = data.ages[ageKey];
                    const active = idx === 0 ? " active" : "";
                    tabsHtml += `<div class="age-tab${active}" onclick="switchAge('${ageKey}')">${age.age_name}</div>`;
                    contentsHtml += `<div id="age-${ageKey}" class="age-content${active}">`;

                    if (age.error) {
                        contentsHtml += `<div class="no-data">${age.error}</div>`;
                    } else {
                        contentsHtml += renderAgeAnalysis(data, ageKey, age);
                    }
                    contentsHtml += `</div>`;
                });

                resultsEl.innerHTML = `
                    <div class="matchup-header">
                        <h2><span class="civ1-color">${data.civ1}</span> <span style="color:#888">vs</span> <span class="civ2-color">${data.civ2}</span></h2>
                    </div>
                    <div class="age-tab-bar">${tabsHtml}</div>
                    ${contentsHtml}`;
            }

            function switchAge(ageKey) {
                document.querySelectorAll(".age-tab").forEach((t, i) => {
                    t.classList.toggle("active", t.textContent.toLowerCase().includes(ageKey));
                });
                document.querySelectorAll(".age-content").forEach(c => {
                    c.classList.toggle("active", c.id === "age-" + ageKey);
                });
            }

            function renderAgeAnalysis(data, ageKey, age) {
                let html = '';

                // --- 3-column analysis ---
                const p1 = age.phase1_mobile;
                const p2 = age.phase2_ranged;
                const bm = age.best_mobile;
                const bMelee = age.best_melee;

                const domCiv = p1.dominant_civ;
                const weakerCiv = domCiv === "civ1" ? "civ2" : "civ1";
                const domName = domCiv === "civ1" ? data.civ1 : data.civ2;
                const weakerName = weakerCiv === "civ1" ? data.civ1 : data.civ2;
                const domColor = domCiv === "civ1" ? "civ1-color" : "civ2-color";
                const weakerColor = weakerCiv === "civ1" ? "civ1-color" : "civ2-color";

                html += `<div class="analysis-columns">`;

                // Column 1: Mobile Dominance
                html += `<div class="analysis-col">`;
                html += `<div class="col-header">Mobile Control</div>`;
                if (domCiv && p1.dominant_unit) {
                    html += `<div class="col-civ ${domColor}">${domName}</div>`;
                    html += unitBadge(p1.dominant_unit.name);
                    const hasBothMobile = p1.civ1_units.length > 0 && p1.civ2_units.length > 0;
                    if (!hasBothMobile) {
                        html += `<div class="col-detail">${weakerName} has no mobile units (speed &gt; 1.3)</div>`;
                    } else {
                        html += `<div class="col-detail">Wins/draws all mobile matchups</div>`;
                    }
                } else {
                    html += `<div class="no-unit">Neither civ has clear mobile advantage</div>`;
                }
                html += `</div>`;

                // Column 2: Ranged Power (show both civs' best ranged, highlight winner)
                html += `<div class="analysis-col">`;
                html += `<div class="col-header">Ranged Power</div>`;
                const rw = p2.ranged_winner;
                const c1r = p2.civ1_best_ranged;
                const c2r = p2.civ2_best_ranged;
                if (rw) {
                    const rangedWinnerName = rw === "civ1" ? data.civ1 : data.civ2;
                    const rangedWinnerColor = rw === "civ1" ? "civ1-color" : "civ2-color";
                    const rangedUnit = rw === "civ1" ? c1r : c2r;
                    html += `<div class="col-civ ${rangedWinnerColor}">${rangedWinnerName}</div>`;
                    if (rangedUnit) html += unitBadge(rangedUnit.name);
                    if (rw === domCiv) {
                        html += `<div class="col-detail">${rangedWinnerName} dominates both mobile and ranged &mdash; ${weakerName} should focus on melee + siege</div>`;
                    } else {
                        html += `<div class="col-detail">Clear ranged advantage &mdash; beats all opponent ranged</div>`;
                    }
                } else if (c1r || c2r) {
                    html += `<div class="col-detail">Ranged is contested</div>`;
                    if (c1r) {
                        html += `<div style="margin-top:6px"><span class="civ1-color">${data.civ1}:</span> ${unitBadge(c1r.name, "sm")}</div>`;
                    }
                    if (c2r) {
                        html += `<div style="margin-top:4px"><span class="civ2-color">${data.civ2}:</span> ${unitBadge(c2r.name, "sm")}</div>`;
                    }
                } else {
                    html += `<div class="no-unit">No ranged gold units available</div>`;
                }
                html += `</div>`;

                // Column 3: Best Melee
                html += `<div class="analysis-col">`;
                html += `<div class="col-header">Melee Anchor</div>`;
                // Show the weaker civ's best melee (for combo building), or if both useful show both
                const weakerMelee = bMelee[weakerCiv];
                const domMelee = bMelee[domCiv];
                if (weakerMelee) {
                    html += `<div class="col-civ ${weakerColor}">${weakerName}</div>`;
                    html += unitBadge(weakerMelee.name);
                    html += `<div class="col-detail">Highest score against all ${domName} units</div>`;
                } else if (domMelee) {
                    html += `<div class="col-civ ${domColor}">${domName}</div>`;
                    html += unitBadge(domMelee.name);
                    html += `<div class="col-detail">Best melee option for army combo</div>`;
                } else {
                    html += `<div class="no-unit">No melee units available</div>`;
                }
                html += `</div>`;

                html += `</div>`; // end analysis-columns

                // --- Best combo placeholder (filled by renderArmy after sims) ---
                html += `<div id="best-combo-${ageKey}">
                    <div class="combo-section-header">Best Army Combo</div>
                    <div class="loading-spinner" style="padding:16px">
                        <div class="spinner"></div>
                        <div>Simulating army battles to find the best combo...</div>
                    </div>
                </div>`;

                // --- Combos under consideration ---
                const p3 = age.phase3_combos;
                html += `<div class="combo-section-header" style="font-size:1rem;color:#aaa;margin-top:20px">Combos Under Consideration</div>`;
                html += `<div class="alt-combos-grid">`;

                // Civ1 combos
                html += `<div>`;
                for (const c of p3.civ1) {
                    html += `<div class="alt-combo-row civ1-alt">
                        <span class="alt-label civ1-color">${data.civ1}:</span>
                        ${unitBadge(c.primary.name, "sm")}
                        <span class="combo-plus" style="font-size:0.85rem">+</span>
                        ${unitBadge(c.secondary.name, "sm")}
                    </div>`;
                }
                html += `</div>`;

                // Civ2 combos
                html += `<div>`;
                for (const c of p3.civ2) {
                    html += `<div class="alt-combo-row civ2-alt">
                        <span class="alt-label civ2-color">${data.civ2}:</span>
                        ${unitBadge(c.primary.name, "sm")}
                        <span class="combo-plus" style="font-size:0.85rem">+</span>
                        ${unitBadge(c.secondary.name, "sm")}
                    </div>`;
                }
                html += `</div>`;
                html += `</div>`; // end alt-combos-grid

                // --- Army section placeholder ---
                html += `<div class="army-section" id="army-${ageKey}">
                    <div class="army-section-header">Army Battle Simulation</div>
                    <div class="army-loading">
                        <div class="loading-spinner">
                            <div class="spinner"></div>
                            <div>Running army simulations (5000 resources, testing splits)...</div>
                        </div>
                    </div>
                </div>`;

                return html;
            }

            /* ---- Render phase 4 (army) ---- */
            function renderArmy(armyData, analysisData) {
                for (const ageKey of Object.keys(armyData.ages)) {
                    const age = armyData.ages[ageKey];
                    if (age.error) {
                        const bc = document.getElementById("best-combo-" + ageKey);
                        if (bc) bc.innerHTML = `<div class="combo-section-header">Best Army Combo</div><div class="no-data">${age.error}</div>`;
                        const ac = document.getElementById("army-" + ageKey);
                        if (ac) ac.innerHTML = `<div class="army-section-header">Army Battle Simulation</div><div class="no-data">${age.error}</div>`;
                        continue;
                    }

                    const combos = age.combos;
                    const best = age.best_combo;
                    const counters = age.counters;
                    const grid = age.combo_grid;

                    // --- Fill best combo placeholder ---
                    const bestComboEl = document.getElementById("best-combo-" + ageKey);
                    if (bestComboEl) {
                        let bhtml = `<div class="combo-section-header">Best Army Combo</div>`;
                        bhtml += `<div class="combo-cards">`;

                        const c1best = combos.civ1[best.civ1.combo_id];
                        if (c1best) {
                            bhtml += `<div class="combo-card civ1-card">
                                <div>
                                    <div class="combo-civ-name civ1-color">${armyData.civ1}</div>
                                    <div class="combo-units-row">
                                        ${unitBadge(c1best.primary.name, "sm")}
                                        <span class="combo-plus">+</span>
                                        ${unitBadge(c1best.secondary.name, "sm")}
                                    </div>
                                    <div class="combo-reasoning">${best.civ1.wins}W ${best.civ1.losses}L ${best.civ1.draws}D &mdash; ${Math.round(c1best.best_split[0]*100)}/${Math.round(c1best.best_split[1]*100)} split</div>
                                </div>
                            </div>`;
                        }

                        const c2best = combos.civ2[best.civ2.combo_id];
                        if (c2best) {
                            bhtml += `<div class="combo-card civ2-card">
                                <div>
                                    <div class="combo-civ-name civ2-color">${armyData.civ2}</div>
                                    <div class="combo-units-row">
                                        ${unitBadge(c2best.primary.name, "sm")}
                                        <span class="combo-plus">+</span>
                                        ${unitBadge(c2best.secondary.name, "sm")}
                                    </div>
                                    <div class="combo-reasoning">${best.civ2.wins}W ${best.civ2.losses}L ${best.civ2.draws}D &mdash; ${Math.round(c2best.best_split[0]*100)}/${Math.round(c2best.best_split[1]*100)} split</div>
                                </div>
                            </div>`;
                        }

                        bhtml += `</div>`;
                        bestComboEl.innerHTML = bhtml;
                    }

                    // --- Fill army section ---
                    const container = document.getElementById("army-" + ageKey);
                    if (!container) continue;

                    let html = `<div class="army-section-header">Army Battle Simulation</div>`;

                    // Explanation
                    html += `<div class="army-explanation">
                        Each side gets <strong>5000 resources</strong> to build a mixed army of their 2-unit combo.
                        We test 5 resource splits (70/30 to 30/70) for each side and simulate the battle.
                        The best split for each combo is the one that wins or survives with the most HP across all opponent splits.
                        Each combo pair is tested at 25 split combinations to find the optimal ratio.
                    </div>`;

                    // Per-civ best combo detail cards
                    html += `<div class="army-best-results">`;

                    const c1best = combos.civ1[best.civ1.combo_id];
                    if (c1best) {
                        html += `<div class="army-best-card civ1-card">
                            <div class="best-civ-name civ1-color">${armyData.civ1}</div>
                            <div class="best-combo-detail">
                                ${unitBadge(c1best.primary.name, "sm")}
                                <span class="combo-plus">+</span>
                                ${unitBadge(c1best.secondary.name, "sm")}
                            </div>
                            <div class="best-record">Record: ${best.civ1.wins}W ${best.civ1.losses}L ${best.civ1.draws}D across all opponent combos</div>
                            <div class="best-split">Best split: ${Math.round(c1best.best_split[0]*100)}/${Math.round(c1best.best_split[1]*100)} resources</div>`;
                        if (counters.civ1_countered_by) {
                            const cb = counters.civ1_countered_by;
                            html += `<div class="best-countered">Countered by: ${unitBadge(cb.primary, "sm")} + ${unitBadge(cb.secondary, "sm")}</div>`;
                        }
                        html += `</div>`;
                    }

                    const c2best = combos.civ2[best.civ2.combo_id];
                    if (c2best) {
                        html += `<div class="army-best-card civ2-card">
                            <div class="best-civ-name civ2-color">${armyData.civ2}</div>
                            <div class="best-combo-detail">
                                ${unitBadge(c2best.primary.name, "sm")}
                                <span class="combo-plus">+</span>
                                ${unitBadge(c2best.secondary.name, "sm")}
                            </div>
                            <div class="best-record">Record: ${best.civ2.wins}W ${best.civ2.losses}L ${best.civ2.draws}D across all opponent combos</div>
                            <div class="best-split">Best split: ${Math.round(c2best.best_split[0]*100)}/${Math.round(c2best.best_split[1]*100)} resources</div>`;
                        if (counters.civ2_countered_by) {
                            const cb = counters.civ2_countered_by;
                            html += `<div class="best-countered">Countered by: ${unitBadge(cb.primary, "sm")} + ${unitBadge(cb.secondary, "sm")}</div>`;
                        }
                        html += `</div>`;
                    }

                    html += `</div>`; // end army-best-results

                    // Full grid (collapsible)
                    if (grid.length > 0) {
                        const gridId = "army-grid-" + ageKey;
                        html += `<button class="army-grid-toggle" onclick="document.getElementById('${gridId}').style.display = document.getElementById('${gridId}').style.display === 'none' ? 'block' : 'none'">
                            Show/Hide All ${grid.length} Matchup Results
                        </button>`;
                        html += `<div class="army-full-grid" id="${gridId}" style="display:none">`;
                        for (const g of grid) {
                            const c1c = combos.civ1[g.civ1_combo_id];
                            const c2c = combos.civ2[g.civ2_combo_id];
                            if (!c1c || !c2c) continue;
                            const winCls = g.winner === "civ1" ? "civ1-win" : g.winner === "civ2" ? "civ2-win" : "draw-result";
                            const winLabel = g.winner === "civ1" ? armyData.civ1 : g.winner === "civ2" ? armyData.civ2 : "Draw";
                            html += `<div class="army-result-row">
                                <div class="combo-desc">
                                    <span class="civ1-color">${c1c.primary.name}+${c1c.secondary.name}</span>
                                    <span style="color:#666"> (${g.counts_civ1[0]}+${g.counts_civ1[1]}) vs </span>
                                    <span class="civ2-color">${c2c.primary.name}+${c2c.secondary.name}</span>
                                    <span style="color:#666"> (${g.counts_civ2[0]}+${g.counts_civ2[1]})</span>
                                </div>
                                <span class="army-winner ${winCls}">${winLabel}</span>
                            </div>`;
                        }
                        html += `</div>`;
                    }

                    container.innerHTML = html;
                }
            }
        </script>
    </body>
</html>
