<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Review Comments - AoE2 Unit Analyzer</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --primary-color: #8b4513;
                --secondary-color: #daa520;
                --bg-color: #1a1a2e;
                --card-bg: #16213e;
                --text-color: #e8e8e8;
                --highlight-better: #2ecc71;
                --highlight-worse: #e74c3c;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: "Open Sans", sans-serif;
                background: linear-gradient(135deg, var(--bg-color) 0%, #0f0f23 100%);
                color: var(--text-color);
                min-height: 100vh;
                padding: 20px;
            }

            .container {
                max-width: 1200px;
                margin: 0 auto;
            }

            header {
                text-align: center;
                padding: 30px 0;
                margin-bottom: 30px;
            }

            h1 {
                font-family: "Cinzel", serif;
                font-size: 2.5rem;
                color: var(--secondary-color);
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
                margin-bottom: 10px;
            }

            .subtitle {
                font-size: 1.1rem;
                color: #888;
            }

            .nav-links {
                display: flex;
                gap: 15px;
                justify-content: center;
                margin-top: 15px;
            }

            .nav-link {
                color: var(--text-color);
                text-decoration: none;
                padding: 8px 16px;
                border-radius: 5px;
                background: rgba(255, 255, 255, 0.1);
                transition: all 0.3s;
            }

            .nav-link:hover {
                background: rgba(218, 165, 32, 0.3);
            }

            .nav-link.active {
                background: var(--secondary-color);
                color: #1a1a2e;
                font-weight: 600;
            }

            .filters {
                display: flex;
                gap: 15px;
                justify-content: center;
                margin-bottom: 30px;
                flex-wrap: wrap;
            }

            .filter-btn {
                padding: 10px 20px;
                font-size: 0.95rem;
                background: var(--card-bg);
                color: var(--text-color);
                border: 2px solid transparent;
                border-radius: 8px;
                cursor: pointer;
                transition: all 0.3s ease;
            }

            .filter-btn:hover {
                border-color: var(--secondary-color);
            }

            .filter-btn.active {
                background: var(--secondary-color);
                color: #1a1a2e;
                font-weight: 600;
            }

            .stats {
                display: flex;
                gap: 20px;
                justify-content: center;
                margin-bottom: 30px;
            }

            .stat-box {
                background: var(--card-bg);
                padding: 15px 25px;
                border-radius: 10px;
                text-align: center;
            }

            .stat-number {
                font-size: 2rem;
                font-weight: 700;
                color: var(--secondary-color);
            }

            .stat-label {
                font-size: 0.85rem;
                color: #888;
            }

            .comments-list {
                display: flex;
                flex-direction: column;
                gap: 15px;
            }

            .comment-card {
                background: var(--card-bg);
                border-radius: 12px;
                padding: 20px;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            }

            .comment-card.resolved {
                opacity: 0.6;
            }

            .comment-header {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                margin-bottom: 15px;
                flex-wrap: wrap;
                gap: 10px;
            }

            .comment-location {
                font-family: "Cinzel", serif;
                font-size: 1.1rem;
                color: var(--secondary-color);
            }

            .comment-meta {
                color: #888;
                font-size: 0.85rem;
            }

            .comment-badges {
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
            }

            .badge {
                padding: 4px 10px;
                border-radius: 15px;
                font-size: 0.8rem;
                font-weight: 600;
            }

            .badge-age {
                background: rgba(155, 89, 182, 0.3);
                color: #bb8fce;
            }

            .badge-column {
                background: rgba(52, 152, 219, 0.3);
                color: #5dade2;
            }

            .badge-resolved {
                background: rgba(46, 204, 113, 0.3);
                color: var(--highlight-better);
            }

            .badge-open {
                background: rgba(231, 76, 60, 0.3);
                color: var(--highlight-worse);
            }

            .comment-text {
                font-size: 1rem;
                line-height: 1.5;
                margin-bottom: 15px;
                padding: 15px;
                background: rgba(0, 0, 0, 0.2);
                border-radius: 8px;
            }

            .comment-actions {
                display: flex;
                gap: 10px;
            }

            .action-btn {
                padding: 8px 16px;
                border-radius: 6px;
                border: none;
                cursor: pointer;
                font-size: 0.9rem;
                transition: all 0.3s;
            }

            .action-btn.resolve {
                background: rgba(46, 204, 113, 0.2);
                color: var(--highlight-better);
            }

            .action-btn.resolve:hover {
                background: rgba(46, 204, 113, 0.4);
            }

            .action-btn.delete {
                background: rgba(231, 76, 60, 0.2);
                color: var(--highlight-worse);
            }

            .action-btn.delete:hover {
                background: rgba(231, 76, 60, 0.4);
            }

            .action-btn.view {
                background: rgba(52, 152, 219, 0.2);
                color: #5dade2;
            }

            .action-btn.view:hover {
                background: rgba(52, 152, 219, 0.4);
            }

            .no-comments {
                text-align: center;
                padding: 60px 20px;
                color: #888;
            }

            .no-comments h2 {
                font-family: "Cinzel", serif;
                font-size: 1.5rem;
                margin-bottom: 10px;
                color: var(--secondary-color);
            }

            .loading {
                text-align: center;
                padding: 60px;
                font-size: 1.2rem;
                color: #888;
            }

            @media (max-width: 768px) {
                h1 {
                    font-size: 1.8rem;
                }
                .comment-header {
                    flex-direction: column;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <header>
                <h1>Review Comments</h1>
                <p class="subtitle">Review and manage user feedback on unit data</p>
                <nav class="nav-links">
                    <a href="/" class="nav-link">By Unit</a>
                    <a href="/civ" class="nav-link">By Civilization</a>
                    <a href="/review" class="nav-link active">Review Comments</a>
                </nav>
            </header>

            <div class="filters">
                <button class="filter-btn active" data-filter="all">All Comments</button>
                <button class="filter-btn" data-filter="open">Open</button>
                <button class="filter-btn" data-filter="resolved">Resolved</button>
            </div>

            <div class="stats" id="stats">
                <div class="stat-box">
                    <div class="stat-number" id="totalCount">-</div>
                    <div class="stat-label">Total Comments</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="openCount">-</div>
                    <div class="stat-label">Open</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="resolvedCount">-</div>
                    <div class="stat-label">Resolved</div>
                </div>
            </div>

            <div id="content">
                <div class="loading">Loading comments...</div>
            </div>
        </div>

        <script>
            let allComments = [];
            let currentFilter = 'all';

            // Filter button handlers
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    renderComments();
                });
            });

            async function loadComments() {
                try {
                    const response = await fetch('/api/comments/all');
                    allComments = await response.json();
                    updateStats();
                    renderComments();
                } catch (error) {
                    console.error('Error loading comments:', error);
                    document.getElementById('content').innerHTML =
                        '<div class="no-comments"><h2>Error loading comments</h2><p>Please try again</p></div>';
                }
            }

            function updateStats() {
                const open = allComments.filter(c => !c.resolved).length;
                const resolved = allComments.filter(c => c.resolved).length;

                document.getElementById('totalCount').textContent = allComments.length;
                document.getElementById('openCount').textContent = open;
                document.getElementById('resolvedCount').textContent = resolved;
            }

            function renderComments() {
                let filtered = allComments;

                if (currentFilter === 'open') {
                    filtered = allComments.filter(c => !c.resolved);
                } else if (currentFilter === 'resolved') {
                    filtered = allComments.filter(c => c.resolved);
                }

                if (filtered.length === 0) {
                    document.getElementById('content').innerHTML = `
                        <div class="no-comments">
                            <h2>No ${currentFilter === 'all' ? '' : currentFilter} comments</h2>
                            <p>${currentFilter === 'all' ? 'No comments have been submitted yet.' : 'No comments match this filter.'}</p>
                        </div>
                    `;
                    return;
                }

                const html = `
                    <div class="comments-list">
                        ${filtered.map(comment => renderCommentCard(comment)).join('')}
                    </div>
                `;

                document.getElementById('content').innerHTML = html;
            }

            function renderCommentCard(comment) {
                const date = new Date(comment.created_at).toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                const ageSlug = getAgeSlug(comment.age_name);

                return `
                    <div class="comment-card ${comment.resolved ? 'resolved' : ''}">
                        <div class="comment-header">
                            <div>
                                <div class="comment-location">${comment.civ_name} - ${comment.unit_name}</div>
                                <div class="comment-meta">By ${comment.author_name || 'Anonymous'} on ${date}</div>
                            </div>
                            <div class="comment-badges">
                                <span class="badge badge-age">${comment.age_name}</span>
                                <span class="badge badge-column">${formatColumnName(comment.column_name)}</span>
                                <span class="badge ${comment.resolved ? 'badge-resolved' : 'badge-open'}">
                                    ${comment.resolved ? 'Resolved' : 'Open'}
                                </span>
                            </div>
                        </div>
                        <div class="comment-text">${escapeHtml(comment.comment_text)}</div>
                        <div class="comment-actions">
                            <a href="/?age=${ageSlug}&unit=${comment.unit_slug}" class="action-btn view">View Unit</a>
                            ${!comment.resolved ? `<button class="action-btn resolve" onclick="resolveComment(${comment.id})">Mark Resolved</button>` : ''}
                            <button class="action-btn delete" onclick="deleteComment(${comment.id})">Delete</button>
                        </div>
                    </div>
                `;
            }

            function getAgeSlug(ageName) {
                if (ageName.includes('Feudal')) return 'feudal';
                if (ageName.includes('Castle')) return 'castle';
                if (ageName.includes('Imperial')) return 'imperial';
                return 'castle';
            }

            function formatColumnName(col) {
                return col.replace(/_/g, ' ');
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            async function resolveComment(id) {
                try {
                    const response = await fetch(`/api/comments/${id}/resolve`, { method: 'POST' });
                    const result = await response.json();

                    if (result.success) {
                        // Update local data
                        const comment = allComments.find(c => c.id === id);
                        if (comment) comment.resolved = true;
                        updateStats();
                        renderComments();
                    } else {
                        alert('Error resolving comment');
                    }
                } catch (error) {
                    console.error('Error resolving comment:', error);
                    alert('Error resolving comment');
                }
            }

            async function deleteComment(id) {
                if (!confirm('Are you sure you want to delete this comment?')) return;

                try {
                    const response = await fetch(`/api/comments/${id}`, { method: 'DELETE' });
                    const result = await response.json();

                    if (result.success) {
                        // Remove from local data
                        allComments = allComments.filter(c => c.id !== id);
                        updateStats();
                        renderComments();
                    } else {
                        alert('Error deleting comment');
                    }
                } catch (error) {
                    console.error('Error deleting comment:', error);
                    alert('Error deleting comment');
                }
            }

            // Load comments on page load
            loadComments();
        </script>
    </body>
</html>
