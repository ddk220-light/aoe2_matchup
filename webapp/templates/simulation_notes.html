<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Simulation Notes - AoE2 Unit Analyzer</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --primary-color: #8b4513;
                --secondary-color: #daa520;
                --bg-color: #1a1a2e;
                --card-bg: #16213e;
                --text-color: #e8e8e8;
                --team1-color: #e74c3c;
                --team2-color: #2ecc71;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: "Open Sans", sans-serif;
                background: linear-gradient(
                    135deg,
                    var(--bg-color) 0%,
                    #0f0f23 100%
                );
                color: var(--text-color);
                min-height: 100vh;
                padding: 20px;
            }

            .container {
                max-width: 1200px;
                margin: 0 auto;
            }

            header {
                text-align: center;
                padding: 20px 0;
                margin-bottom: 30px;
            }

            h1 {
                font-family: "Cinzel", serif;
                font-size: 2.5rem;
                color: var(--secondary-color);
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
                margin-bottom: 10px;
            }

            .subtitle {
                font-size: 1rem;
                color: #888;
            }

            .nav-links {
                display: flex;
                gap: 15px;
                justify-content: center;
                margin-top: 15px;
            }

            .nav-link {
                color: var(--text-color);
                text-decoration: none;
                padding: 8px 16px;
                border-radius: 5px;
                background: rgba(255, 255, 255, 0.1);
                transition: all 0.3s;
            }

            .nav-link:hover {
                background: rgba(218, 165, 32, 0.3);
            }

            .nav-link.active {
                background: var(--secondary-color);
                color: #1a1a2e;
                font-weight: 600;
            }

            .filters {
                background: var(--card-bg);
                padding: 20px;
                border-radius: 8px;
                margin-bottom: 20px;
                display: flex;
                gap: 15px;
                flex-wrap: wrap;
                align-items: center;
            }

            .filters label {
                color: #aaa;
                font-size: 0.9rem;
            }

            .filters select {
                padding: 8px 12px;
                background: var(--bg-color);
                border: 1px solid rgba(218, 165, 32, 0.3);
                color: var(--text-color);
                border-radius: 4px;
                font-size: 14px;
            }

            .filters select:focus {
                outline: none;
                border-color: var(--secondary-color);
            }

            .notes-list {
                display: flex;
                flex-direction: column;
                gap: 15px;
            }

            .note-card {
                background: var(--card-bg);
                border-radius: 8px;
                padding: 20px;
                border-left: 4px solid var(--secondary-color);
            }

            .note-header {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                margin-bottom: 15px;
                flex-wrap: wrap;
                gap: 10px;
            }

            .matchup-info {
                flex: 1;
            }

            .matchup-title {
                font-family: "Cinzel", serif;
                font-size: 1.1rem;
                margin-bottom: 5px;
            }

            .matchup-title .team1 {
                color: var(--team1-color);
            }

            .matchup-title .team2 {
                color: var(--team2-color);
            }

            .matchup-title .vs {
                color: #888;
                margin: 0 8px;
            }

            .winner-badge {
                padding: 4px 12px;
                border-radius: 4px;
                font-size: 0.8rem;
                font-weight: 600;
            }

            .winner-badge.team1 {
                background: rgba(231, 76, 60, 0.2);
                color: var(--team1-color);
            }

            .winner-badge.team2 {
                background: rgba(46, 204, 113, 0.2);
                color: var(--team2-color);
            }

            .winner-badge.draw {
                background: rgba(218, 165, 32, 0.2);
                color: var(--secondary-color);
            }

            .note-content {
                color: var(--text-color);
                line-height: 1.6;
                margin-bottom: 15px;
                white-space: pre-wrap;
            }

            .note-footer {
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 0.85rem;
                color: #666;
            }

            .note-date {
                color: #888;
            }

            .delete-btn {
                background: transparent;
                border: 1px solid rgba(231, 76, 60, 0.5);
                color: var(--team1-color);
                padding: 5px 12px;
                border-radius: 4px;
                cursor: pointer;
                font-size: 0.8rem;
                transition: all 0.3s;
            }

            .delete-btn:hover {
                background: rgba(231, 76, 60, 0.2);
            }

            .empty-state {
                text-align: center;
                padding: 60px 20px;
                color: #666;
            }

            .empty-state h2 {
                font-family: "Cinzel", serif;
                color: var(--secondary-color);
                margin-bottom: 10px;
            }

            .stats-summary {
                background: var(--card-bg);
                padding: 15px 20px;
                border-radius: 8px;
                margin-bottom: 20px;
                display: flex;
                gap: 30px;
                flex-wrap: wrap;
            }

            .stat-item {
                text-align: center;
            }

            .stat-value {
                font-size: 1.5rem;
                font-weight: 600;
                color: var(--secondary-color);
            }

            .stat-label {
                font-size: 0.8rem;
                color: #888;
            }

            @media (max-width: 768px) {
                .nav-links {
                    flex-wrap: wrap;
                    gap: 8px;
                }

                h1 {
                    font-size: 1.8rem;
                }

                .filters {
                    flex-direction: column;
                    align-items: stretch;
                }

                .note-header {
                    flex-direction: column;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <header>
                <h1>Simulation Notes</h1>
                <p class="subtitle">
                    Review and manage your battle observations
                </p>
                <nav class="nav-links">
                    <a href="/" class="nav-link">Home</a>
                    <a href="/units" class="nav-link">By Unit</a>
                    <a href="/civ" class="nav-link">By Civilization</a>
                    <a href="/simulate" class="nav-link">Battle Sim</a>
                    <a href="/matchup-advisor" class="nav-link">Civ Matchup</a>
                </nav>
            </header>

            <div class="stats-summary" id="statsSummary">
                <div class="stat-item">
                    <div class="stat-value" id="totalNotes">0</div>
                    <div class="stat-label">Total Notes</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="uniqueMatchups">0</div>
                    <div class="stat-label">Unique Matchups</div>
                </div>
            </div>

            <div class="filters">
                <label>Filter by Civilization:</label>
                <select id="civFilter">
                    <option value="">All Civilizations</option>
                    {% for civ in civs %}
                    <option value="{{ civ }}">{{ civ }}</option>
                    {% endfor %}
                </select>

                <label>Filter by Winner:</label>
                <select id="winnerFilter">
                    <option value="">All Results</option>
                    <option value="1">Team 1 Won</option>
                    <option value="2">Team 2 Won</option>
                    <option value="0">Draw</option>
                </select>
            </div>

            <div class="notes-list" id="notesList">
                <div class="empty-state">
                    <h2>Loading notes...</h2>
                </div>
            </div>
        </div>

        <script>
            let allNotes = [];

            document.addEventListener("DOMContentLoaded", async () => {
                await loadNotes();

                document
                    .getElementById("civFilter")
                    .addEventListener("change", filterNotes);
                document
                    .getElementById("winnerFilter")
                    .addEventListener("change", filterNotes);
            });

            async function loadNotes() {
                try {
                    const response = await fetch("/api/simulation-comments");
                    allNotes = await response.json();
                    updateStats();
                    renderNotes(allNotes);
                } catch (error) {
                    document.getElementById("notesList").innerHTML = `
                        <div class="empty-state">
                            <h2>Error Loading Notes</h2>
                            <p>${error.message}</p>
                        </div>
                    `;
                }
            }

            function updateStats() {
                document.getElementById("totalNotes").textContent =
                    allNotes.length;

                const uniqueMatchups = new Set(
                    allNotes.map(
                        (n) =>
                            `${n.team1_civ}-${n.team1_unit}-${n.team2_civ}-${n.team2_unit}`,
                    ),
                );
                document.getElementById("uniqueMatchups").textContent =
                    uniqueMatchups.size;
            }

            function filterNotes() {
                const civFilter = document.getElementById("civFilter").value;
                const winnerFilter =
                    document.getElementById("winnerFilter").value;

                let filtered = allNotes;

                if (civFilter) {
                    filtered = filtered.filter(
                        (n) =>
                            n.team1_civ === civFilter ||
                            n.team2_civ === civFilter,
                    );
                }

                if (winnerFilter !== "") {
                    filtered = filtered.filter(
                        (n) => n.winner === parseInt(winnerFilter),
                    );
                }

                renderNotes(filtered);
            }

            function renderNotes(notes) {
                const container = document.getElementById("notesList");

                if (notes.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <h2>No Notes Found</h2>
                            <p>Run some battle simulations and add notes to see them here.</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = notes
                    .map((note) => {
                        let winnerBadge = "";
                        if (note.winner === 1) {
                            winnerBadge =
                                '<span class="winner-badge team1">Team 1 Won</span>';
                        } else if (note.winner === 2) {
                            winnerBadge =
                                '<span class="winner-badge team2">Team 2 Won</span>';
                        } else if (note.winner === 0) {
                            winnerBadge =
                                '<span class="winner-badge draw">Draw</span>';
                        }

                        const date = new Date(note.created_at).toLocaleString();

                        return `
                        <div class="note-card" data-id="${note.id}">
                            <div class="note-header">
                                <div class="matchup-info">
                                    <div class="matchup-title">
                                        <span class="team1">${note.team1_count}x ${note.team1_civ} ${note.team1_unit}</span>
                                        <span class="vs">vs</span>
                                        <span class="team2">${note.team2_count}x ${note.team2_civ} ${note.team2_unit}</span>
                                    </div>
                                </div>
                                ${winnerBadge}
                            </div>
                            <div class="note-content">${escapeHtml(note.comment)}</div>
                            <div class="note-footer">
                                <span class="note-date">${date}</span>
                                <button class="delete-btn" onclick="deleteNote(${note.id})">Delete</button>
                            </div>
                        </div>
                    `;
                    })
                    .join("");
            }

            function escapeHtml(text) {
                const div = document.createElement("div");
                div.textContent = text;
                return div.innerHTML;
            }

            async function deleteNote(id) {
                if (!confirm("Are you sure you want to delete this note?")) {
                    return;
                }

                try {
                    const response = await fetch(
                        `/api/simulation-comments/${id}`,
                        {
                            method: "DELETE",
                        },
                    );
                    const result = await response.json();

                    if (result.success) {
                        allNotes = allNotes.filter((n) => n.id !== id);
                        updateStats();
                        filterNotes();
                    } else {
                        alert("Failed to delete note");
                    }
                } catch (error) {
                    alert(`Error: ${error.message}`);
                }
            }
        </script>
    </body>
</html>
